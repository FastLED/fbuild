[env:esp32p4]
platform = espressif32
board = esp32-p4-evboard
framework = arduino
board_build.partitions = huge_app.csv
; Route Arduino `Serial` to the board's USB-Serial/JTAG console so sketch output
; is visible on the same USB port used for flashing (COM-on-Windows). Without
; this, `Serial` defaults to UART0 and nothing reaches the host.
build_flags = -DARDUINO_USB_CDC_ON_BOOT=1 -DARDUINO_USB_MODE=1
