name: Build Arduino Uno

on:
  workflow_dispatch: {}
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: ./.github/workflows/template_build.yml
    with:
      workflow-name: "Arduino Uno"
      test-dir: "tests/platform/uno"
      env-name: "uno"
      firmware-ext: "hex"
