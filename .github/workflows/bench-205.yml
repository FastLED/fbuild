name: Perf benches (#205)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'crates/fbuild-header-scan/**'
      - 'crates/fbuild-library-select/**'
      - 'crates/fbuild-test-support/src/mini_framework.rs'
      - 'bench/fastled-examples/**'
      - '.github/workflows/bench-205.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  bench:
    name: Bench (${{ matrix.bench }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: fbuild-header-scan
            bench: scan_throughput
            target: P-03 (>= 50 MB/s single-thread)
          - crate: fbuild-library-select
            bench: resolve_cold
            target: P-02 (<= 200 ms cold for typical project)
          - crate: fbuild-library-select
            bench: resolve_warm
            target: P-01-mini (warm cache against MiniFramework, baseline TBD)
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
      - name: Setup soldr
        uses: zackees/setup-soldr@v0.9.41
        with:
          cache: true
          build-cache: true
          target-cache: true
          prebuild-deps: none

      - name: "Run ${{ matrix.bench }} (target: ${{ matrix.target }})"
        run: |
          soldr cargo bench -p ${{ matrix.crate }} --bench ${{ matrix.bench }} -- --output-format bencher | tee bench-${{ matrix.bench }}.txt

      - name: Upload criterion HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-${{ matrix.bench }}
          path: |
            target/criterion/**
            bench-${{ matrix.bench }}.txt
          if-no-files-found: warn
          retention-days: 14

  fastled-examples:
    name: Bench (fastled-examples — AC#5 ≤ 50 ms warm)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
      - name: Setup soldr
        uses: zackees/setup-soldr@v0.9.41
        with:
          cache: true
          build-cache: true
          target-cache: true
          prebuild-deps: none

      - name: Checkout FastLED
        uses: actions/checkout@v6
        with:
          repository: FastLED/FastLED
          path: external/fastled
          # Pinned to a FastLED release tag for reproducibility. Bump in
          # lockstep with the sample-numbers table in
          # bench/fastled-examples/README.md when retaking baseline.
          ref: "3.10.3"

      - name: Run bench-fastled-examples (AC#5 enforcement, threshold 50 ms)
        env:
          FASTLED_DIR: ${{ github.workspace }}/external/fastled
        run: |
          mkdir -p bench/fastled-examples
          soldr cargo run --release -p fbuild-bench-fastled-examples -- \
            --max-warm-ms 50 \
            --json bench/fastled-examples/report.json | tee bench/fastled-examples/report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-fastled-examples
          path: |
            bench/fastled-examples/report.md
            bench/fastled-examples/report.json
          if-no-files-found: warn
          retention-days: 30
