name: Build LPC845-BRK

on:
  workflow_dispatch: {}
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: ./.github/workflows/template_build.yml
    with:
      workflow-name: "NXP LPC845-BRK"
      test-dir: "tests/platform/lpc845brk"
      env-name: "lpc845brk"
      firmware-ext: "bin"
