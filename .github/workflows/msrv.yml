name: Min Rust Version (1.75)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  msrv:
    name: Min Rust Version (1.75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup soldr
        id: setup-soldr
        uses: zackees/setup-soldr@v0
        with:
          cache: true
          build-cache: true
          target-cache: true
          toolchain: 1.75.0

      - name: Check MSRV
        run: soldr cargo check --workspace
