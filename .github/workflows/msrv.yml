name: Min Rust Version (1.94.1)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  msrv:
    name: Min Rust Version (1.94.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup soldr
        id: setup-soldr
        uses: zackees/setup-soldr@v0
        with:
          cache: true
          build-cache: true
          target-cache: true
          prebuild-deps: none
          toolchain: 1.94.1

      - name: Check MSRV
        run: soldr cargo check --workspace
