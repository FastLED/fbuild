name: Formatting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup soldr
        id: setup-soldr
        uses: zackees/setup-soldr@v0.9.57
        with:
          cache: true
          build-cache: true
          target-cache: false
          prebuild-deps: none
      - name: Check formatting
        run: soldr cargo fmt --all -- --check
