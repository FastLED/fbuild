name: Formatting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup soldr
        id: setup-soldr
        uses: zackees/setup-soldr@v0
        with:
          cache: true
          build-cache: true
          target-cache: false
      - name: Check formatting
        run: soldr cargo fmt --all -- --check
