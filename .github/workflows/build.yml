name: Build Native Binaries

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: "main"

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            binary_ext: ""
          - target: aarch64-unknown-linux-musl
            binary_ext: ""
          # x86_64-apple-darwin: was previously blocked on cross-compiling
          # `ring` ARM->x86 from a macos-arm runner. zigbuild from a
          # linux-x86 runner handles this cleanly via `zig cc`, so we can
          # re-enable it whenever the release matrix wants the extra wheel.
          - target: aarch64-apple-darwin
            binary_ext: ""
          - target: x86_64-pc-windows-msvc
            binary_ext: ".exe"
    uses: ./.github/workflows/template_native_build.yml
    with:
      target: ${{ matrix.target }}
      binary_ext: ${{ matrix.binary_ext }}
      ref: ${{ github.event.inputs.ref || 'main' }}
