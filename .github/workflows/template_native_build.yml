name: Native Build Template

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: "Rust target triple (e.g. x86_64-unknown-linux-musl)"
      runner:
        required: true
        type: string
        description: "GitHub Actions runner label (e.g. ubuntu-latest)"
      binary_ext:
        required: false
        type: string
        default: ""
        description: "Binary extension (.exe for Windows, empty otherwise)"
      linux_cross:
        required: false
        type: boolean
        default: false
        description: "Linux aarch64 cross-compilation"
      macos_cross:
        required: false
        type: boolean
        default: false
        description: "macOS x86_64 cross-compilation on ARM runner"
      mac_cross_linux:
        required: false
        type: boolean
        default: false
        description: "Cross-compile macOS target from Linux via soldr + cargo-zigbuild + managed Apple SDK"
      ref:
        required: false
        type: string
        default: ""
        description: "Git ref to build (branch, tag, or SHA)"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # cc-rs env vars for the xwin lanes. ring's build.rs uses cc-rs;
  # without these, cc-rs invokes plain `clang` and the curve25519.c
  # compile fails with `error: no such file or directory: '/imsvc'`
  # (clang-cl-style include flags on a clang driver). The vars are
  # ignored by non-MSVC targets, so it's safe to set them globally.
  # AR_<target>=llvm-lib mirrors cargo-xwin's expectation so cc-rs
  # archiving matches the linker side.
  CC_x86_64_pc_windows_msvc: clang-cl
  CXX_x86_64_pc_windows_msvc: clang-cl
  AR_x86_64_pc_windows_msvc: llvm-lib
  CC_aarch64_pc_windows_msvc: clang-cl
  CXX_aarch64_pc_windows_msvc: clang-cl
  AR_aarch64_pc_windows_msvc: llvm-lib

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  build:
    name: Build (${{ inputs.target }})
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup soldr
        id: setup-soldr
        # v0.9.62 defaults to soldr 0.7.51 — predates the `soldr prepare`
        # builtin (added 0.7.54). v0.9.63 ships with 0.7.59 as the default
        # which is what the mac-cross-from-linux lane needs to fetch the
        # Apple SDK. Bump in one place so the whole template benefits.
        uses: zackees/setup-soldr@v0.9.63
        with:
          # Pin the soldr version explicitly so a future bump of the
          # action's default doesn't silently change build behavior in
          # this template. 0.7.59 is the latest PyPI/npm/GH-Releases
          # release at time of authoring (next release will be 0.7.60).
          # Bumped from 0.7.59 → 0.7.61 to pull soldr#1013 which adds
          # `soldr build` as a clap-captured native verb. Required by
          # the template's "Build release binaries" step below; earlier
          # soldr versions would treat `soldr build` as the External
          # crate-fetch path and fail loudly.
          version: "0.7.61"
          cache: true
          build-cache: true
          target-cache: true
          prebuild-deps: none
          # `fast` (the default) injects mold-or-rust-lld via SOLDR_LINKER,
          # which clobbers the per-target linker config that
          # `cargo zigbuild` needs for aarch64-unknown-linux-musl
          # cross-compile (clang tries to use host /usr/bin/ld and fails
          # with "file in wrong format" on the cross crt1.o). Disable the
          # injection and let cargo + the toolchain decide.
          linker: platform-default
          # Native release builds produce a payload larger than the
          # 512 MiB action default (issue #400). Raise the soft warn
          # threshold; hard cap stays at the action default (6 GiB).
          cache-payload-warn-bytes: 2GiB
          cache-key-suffix: native-${{ inputs.target }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # rust-toolchain.toml pins 1.94.1 which overrides the above;
      # ensure the target stdlib is installed for the pinned toolchain too.
      #
      # The remove + add dance is required for aarch64-pc-windows-msvc
      # (and a known-good safety belt for other targets): setup-soldr's
      # thin-mode build cache can leave rustup's component-manifest
      # claiming a target is installed while the actual rust-std .rlib
      # files have been trimmed from the toolchain dir. `rustup target
      # add` would then say "is up to date" and skip the install, and
      # rustc would later fail with `E0463: can't find crate for 'core'`
      # / `the <triple> target may not be installed`. Forcing the remove
      # first wipes the manifest entry so the subsequent add reinstalls
      # the files for real. `|| true` because remove on an already-
      # missing target exits non-zero.
      - name: Add Rust target
        run: |
          rustup target remove ${{ inputs.target }} || true
          rustup target add ${{ inputs.target }}

      # Linux musl toolchain (libudev is auto-excluded for musl targets by serialport)
      - name: Install Linux dependencies
        if: runner.os == 'Linux' && !inputs.linux_cross && !contains(inputs.target, 'pc-windows-msvc')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config

      # Windows MSVC release artifacts can be cross-built from Linux with
      # cargo-xwin, but native Windows runners use the standard cargo path.
      - name: Install cargo-xwin
        if: runner.os == 'Linux' && contains(inputs.target, 'pc-windows-msvc')
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin

      - name: Install xwin system dependencies
        if: runner.os == 'Linux' && contains(inputs.target, 'pc-windows-msvc')
        run: |
          sudo apt-get update
          # llvm provides llvm-lib + llvm-rc which cc-rs invokes when
          # compiling C build scripts (e.g. blake3's blake3.c) under
          # cargo-xwin. Without it the win-msvc lane fails at
          # `error: failed to find tool "llvm-lib"`.
          sudo apt-get install -y --no-install-recommends clang lld llvm zip

      # cargo-zigbuild — used for two reasons on Linux:
      #   1. musl cross-compilation (linux_cross targets)
      #   2. Building the PyO3 extension with a pinned glibc symbol version
      #      so manylinux_2_17 wheels actually run on glibc 2.17. The native
      #      ubuntu-latest linker would otherwise pull in glibc 2.39 symbols.
      - name: Install cross-compilation tools
        if: runner.os == 'Linux' && !contains(inputs.target, 'pc-windows-msvc')
        run: pip install cargo-zigbuild

      - name: Fetch Windows Python lib for PyO3 cross-compile
        if: runner.os == 'Linux' && contains(inputs.target, 'pc-windows-msvc')
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_VERSION="3.13.0"
          if [[ "${{ inputs.target }}" == aarch64-* ]]; then
            PKG="pythonarm64"
          else
            PKG="python"
          fi
          curl -fsSL -o python.zip "https://www.nuget.org/api/v2/package/${PKG}/${PYTHON_VERSION}"
          mkdir -p python-windows
          unzip -q python.zip -d python-windows
          libs_dir="$(pwd)/python-windows/tools/libs"
          if [ ! -f "$libs_dir/python3.lib" ]; then
            echo "ERROR: python3.lib not found in extracted NuGet package" >&2
            find python-windows -name "python3*.lib" || true
            exit 1
          fi
          echo "PYO3_CROSS_LIB_DIR=$libs_dir" >> "$GITHUB_ENV"
          echo "PYO3_CROSS_PYTHON_VERSION=3.13" >> "$GITHUB_ENV"
          echo "PYO3_CROSS_PYTHON_IMPLEMENTATION=CPython" >> "$GITHUB_ENV"

      # Linux → mac cross — soldr fetches the Apple SDK ahead of the
      # cargo invocation so the SDKROOT export is debuggable independent
      # of the build itself.
      - name: Prepare Apple SDK (Linux → mac cross)
        if: inputs.mac_cross_linux
        shell: bash
        run: soldr prepare --target ${{ inputs.target }}

      - name: Build release binaries
        shell: bash
        # soldr#1012 PR 2: the `else` arm (the soldr-surface dispatch
        # path) migrates from `soldr cargo build` to `soldr build` —
        # the new blessed-default surface added in soldr#1013. Today
        # the two are byte-for-byte identical (soldr build is a clap-
        # captured alias forwarding to the same cargo_front_door); the
        # rename is a forward-compat surface change so subsequent
        # #1012 PRs (3-5) can layer catalogue-driven sysroot prep on
        # the same arm without needing a second fbuild PR. The xwin /
        # zigbuild branches stay on their explicit legacy tools until
        # PR 5 absorbs them — see #1012 for the ordering rationale.
        run: |
          if [ "${{ inputs.mac_cross_linux }}" = "true" ]; then
            # Linux → aarch64-apple-darwin: zigbuild + soldr-managed SDK.
            # Identical recipe to ci/docker-mac-cross/build.sh, which
            # validates this same path against a minimal ubuntu:24.04 image.
            soldr cargo zigbuild --release --target ${{ inputs.target }} \
              -p fbuild-cli \
              -p fbuild-daemon
          elif [ "${{ runner.os }}" = "Linux" ] && [[ "${{ inputs.target }}" == *-pc-windows-msvc ]]; then
            cargo xwin build --release --target ${{ inputs.target }} \
              -p fbuild-cli \
              -p fbuild-daemon
          elif [[ "${{ inputs.target }}" == *-unknown-linux-musl ]]; then
            # Direct `cargo zigbuild` (pip-installed wrapper) bypasses
            # soldr's bin cache, which has been serving a corrupted
            # cargo-zigbuild binary (`Syntax error: ")" unexpected` at
            # line 10) and blocking PyPI publishes. See #331.
            cargo zigbuild --release --target ${{ inputs.target }} \
              -p fbuild-cli \
              -p fbuild-daemon
          else
            # Blessed default surface (soldr#1012 PR 2).
            soldr build --release --target ${{ inputs.target }} \
              -p fbuild-cli \
              -p fbuild-daemon
          fi

      # PyO3 extension — built for ALL targets, including cross-compiled.
      # Notes:
      #   - PYO3_NO_PYTHON=1 + abi3-py310 feature lets pyo3-build-config skip
      #     the host interpreter lookup on cross builds.
      #   - All Linux builds (native AND cross) use cargo-zigbuild against
      #     <arch>-unknown-linux-gnu.2.17 — manylinux wheels are glibc-based
      #     and must work on glibc >= 2.17 (the manylinux_2_17 floor). Native
      #     ubuntu-latest's system linker would otherwise pull in glibc 2.39
      #     symbols, breaking the wheel on every distro older than ubuntu-24.04.
      #     The CLI binaries stay on musl for static-link portability.
      #   - macOS cross: cargo rustc with -undefined dynamic_lookup works the
      #     same as native; just add --target.
      - name: Build Python extension
        shell: bash
        run: |
          PYTHON_TARGET_DIR="target/python-extension"
          if [ "${{ inputs.mac_cross_linux }}" = "true" ]; then
            # Linux → aarch64-apple-darwin PyO3 extension. zigbuild +
            # soldr-managed SDK + PYO3_NO_PYTHON=1 (PyO3's abi3-py310
            # feature lets us skip host interpreter discovery on cross
            # builds). Lands at
            # target/python-extension/aarch64-apple-darwin/release/lib_native.dylib
            # — same path the macOS native lane produced before, so the
            # stage step is unchanged.
            PYO3_NO_PYTHON=1 soldr cargo zigbuild --release \
              --target-dir "${PYTHON_TARGET_DIR}" \
              --target ${{ inputs.target }} -p fbuild-python \
              --features extension-module
          elif [ "${{ runner.os }}" = "Linux" ] && [[ "${{ inputs.target }}" == *-pc-windows-msvc ]]; then
            PYO3_NO_PYTHON=1 cargo xwin build --release \
              --target-dir "${PYTHON_TARGET_DIR}" \
              --target ${{ inputs.target }} -p fbuild-python \
              --features extension-module
          elif [ "${{ runner.os }}" = "Linux" ]; then
            TARGET="${{ inputs.target }}"
            ARCH="${TARGET%%-*}"
            PYO3_TARGET="${ARCH}-unknown-linux-gnu"
            rustup target add "$PYO3_TARGET"
            # Direct `cargo zigbuild` (pip-installed wrapper) — see #331.
            PYO3_NO_PYTHON=1 cargo zigbuild --release \
              --target-dir "${PYTHON_TARGET_DIR}" \
              --target "${PYO3_TARGET}.2.17" -p fbuild-python \
              --features extension-module
          elif [ "${{ inputs.macos_cross }}" = "true" ]; then
            # soldr#1012 PR 2: blessed default surface (was `soldr
            # cargo build`).
            PYO3_NO_PYTHON=1 soldr build --release \
              --target-dir "${PYTHON_TARGET_DIR}" \
              --target ${{ inputs.target }} -p fbuild-python \
              --features extension-module
          elif [ "${{ runner.os }}" = "macOS" ]; then
            # soldr#1012 PR 2: blessed default surface (was `soldr
            # cargo build`).
            soldr build --release --target-dir "${PYTHON_TARGET_DIR}" \
              --target ${{ inputs.target }} \
              -p fbuild-python \
              --features extension-module
          else
            # soldr#1012 PR 2: blessed default surface (was `soldr
            # cargo build`).
            soldr build --release --target-dir "${PYTHON_TARGET_DIR}" \
              --target ${{ inputs.target }} \
              -p fbuild-python \
              --features extension-module
          fi

      - name: Stage artifacts
        shell: bash
        run: |
          PYTHON_TARGET_DIR="target/python-extension"
          mkdir -p staging
          cp target/${{ inputs.target }}/release/fbuild${{ inputs.binary_ext }} staging/
          cp target/${{ inputs.target }}/release/fbuild-daemon${{ inputs.binary_ext }} staging/

          # Stage Python extension — location depends on how it was built
          if [[ "${{ inputs.target }}" == *-pc-windows-msvc ]]; then
            for ext_src in \
              "${PYTHON_TARGET_DIR}/${{ inputs.target }}/release/_native.dll" \
              "${PYTHON_TARGET_DIR}/release/_native.dll"; do
              [ -f "$ext_src" ] && cp "$ext_src" staging/_native.pyd && break
            done
          elif [ "${{ inputs.mac_cross_linux }}" = "true" ]; then
            # Linux → mac cross: dylib lands under the apple-darwin
            # target dir (no manylinux floor, unlike the Linux PyO3 lane).
            ext_src="${PYTHON_TARGET_DIR}/${{ inputs.target }}/release/lib_native.dylib"
            [ -f "$ext_src" ] && cp "$ext_src" staging/_native.abi3.so
          elif [ "${{ runner.os }}" = "Linux" ]; then
            TARGET="${{ inputs.target }}"
            ARCH="${TARGET%%-*}"
            ext_src="${PYTHON_TARGET_DIR}/${ARCH}-unknown-linux-gnu.2.17/release/lib_native.so"
            [ -f "$ext_src" ] || ext_src="${PYTHON_TARGET_DIR}/${ARCH}-unknown-linux-gnu/release/lib_native.so"
            [ -f "$ext_src" ] && cp "$ext_src" staging/_native.abi3.so
          elif [ "${{ runner.os }}" = "macOS" ]; then
            ext_src="${PYTHON_TARGET_DIR}/${{ inputs.target }}/release/lib_native.dylib"
            [ -f "$ext_src" ] && cp "$ext_src" staging/_native.abi3.so
          else
            for ext in so dylib; do
              src="${PYTHON_TARGET_DIR}/release/lib_native.$ext"
              [ -f "$src" ] && cp "$src" staging/_native.abi3.so && break
            done
          fi

          # Fail fast if the extension is missing — we expect it on all targets
          if [ "${{ inputs.binary_ext }}" = ".exe" ]; then
            [ -f staging/_native.pyd ] || { echo "ERROR: _native.pyd missing"; exit 1; }
          else
            [ -f staging/_native.abi3.so ] || { echo "ERROR: _native.abi3.so missing"; exit 1; }
          fi

          # Strip binaries (reduces size significantly)
          if [ "${{ inputs.linux_cross }}" = "true" ]; then
            llvm-strip staging/fbuild || true
            llvm-strip staging/fbuild-daemon || true
            llvm-strip staging/_native.abi3.so 2>/dev/null || true
          elif [ "${{ inputs.mac_cross_linux }}" = "true" ]; then
            # Linux host `strip` is binutils — it would silently corrupt
            # a Mach-O. Skip stripping; ~30 MB is acceptable for release
            # artifacts. A future iteration can wire `llvm-strip` from
            # ziglang's bundled tools.
            true
          elif [[ "${{ inputs.target }}" == *-pc-windows-msvc ]]; then
            true
          elif command -v strip &> /dev/null; then
            strip staging/fbuild${{ inputs.binary_ext }} || true
            strip staging/fbuild-daemon${{ inputs.binary_ext }} || true
            strip staging/_native.abi3.so 2>/dev/null || true
            strip staging/_native.pyd 2>/dev/null || true
          fi

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd staging
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attest native artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: staging/SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ inputs.target }}
          path: staging/
          if-no-files-found: error
