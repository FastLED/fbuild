name: Native Build Template

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: "Rust target triple (e.g. x86_64-unknown-linux-musl)"
      runner:
        required: true
        type: string
        description: "GitHub Actions runner label (e.g. ubuntu-latest)"
      binary_ext:
        required: false
        type: string
        default: ""
        description: "Binary extension (.exe for Windows, empty otherwise)"
      linux_cross:
        required: false
        type: boolean
        default: false
        description: "Linux aarch64 cross-compilation"
      macos_cross:
        required: false
        type: boolean
        default: false
        description: "macOS x86_64 cross-compilation on ARM runner"
      ref:
        required: false
        type: string
        default: ""
        description: "Git ref to build (branch, tag, or SHA)"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build (${{ inputs.target }})
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.target }}

      # rust-toolchain.toml pins 1.94.1 which overrides the above;
      # ensure the target stdlib is installed for the pinned toolchain too
      - name: Add Rust target
        run: rustup target add ${{ inputs.target }}

      - uses: actions/setup-python@v6
        if: ${{ !inputs.linux_cross && !inputs.macos_cross || inputs.linux_cross }}
        with:
          python-version: "3.13"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ inputs.target }}-v2

      # Linux musl toolchain (libudev is auto-excluded for musl targets by serialport)
      - name: Install Linux dependencies
        if: runner.os == 'Linux' && !inputs.linux_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config

      # cargo-zigbuild for musl cross-compilation (zig provides a musl-aware
      # C compiler — no external toolchain downloads needed)
      - name: Install cross-compilation tools
        if: inputs.linux_cross
        run: pip install cargo-zigbuild

      - name: Setup zccache
        shell: bash
        run: |
          pip install zccache
          chmod +x ~/.local/bin/zccache 2>/dev/null || true
          zccache start

      - name: Build release binaries
        shell: bash
        env:
          RUSTC_WRAPPER: zccache
        run: |
          if [ "${{ inputs.linux_cross }}" = "true" ]; then
            cargo-zigbuild build --release --target ${{ inputs.target }} -p fbuild-cli
            cargo-zigbuild build --release --target ${{ inputs.target }} -p fbuild-daemon
          else
            cargo build --release --target ${{ inputs.target }} -p fbuild-cli
            cargo build --release --target ${{ inputs.target }} -p fbuild-daemon
          fi

      # PyO3 extension — skip for cross-compiled targets
      - name: Build Python extension
        if: ${{ !inputs.linux_cross && !inputs.macos_cross }}
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            cargo rustc --release -p fbuild-python -- -C link-args="-undefined dynamic_lookup"
          else
            cargo build --release -p fbuild-python
          fi

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ inputs.target }}/release/fbuild${{ inputs.binary_ext }} staging/
          cp target/${{ inputs.target }}/release/fbuild-daemon${{ inputs.binary_ext }} staging/

          # Stage Python extension — built without --target, so in target/release/
          if [ "${{ inputs.binary_ext }}" = ".exe" ]; then
            [ -f target/release/_native.dll ] && \
              cp target/release/_native.dll staging/_native.pyd
          else
            for ext in so dylib; do
              src="target/release/lib_native.$ext"
              [ -f "$src" ] && cp "$src" staging/_native.abi3.so && break
            done
          fi

          # Strip binaries (reduces size significantly)
          if [ "${{ inputs.linux_cross }}" = "true" ]; then
            llvm-strip staging/fbuild || true
            llvm-strip staging/fbuild-daemon || true
          elif command -v strip &> /dev/null; then
            strip staging/fbuild${{ inputs.binary_ext }} || true
            strip staging/fbuild-daemon${{ inputs.binary_ext }} || true
            strip staging/_native.abi3.so 2>/dev/null || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ inputs.target }}
          path: staging/
          if-no-files-found: error
