name: Native Build Template (cross-compiled from linux-x86)
# Single linux-x86 runner family. zigbuild handles Linux/macOS targets;
# xwin handles Windows-MSVC. Per-OS native runners are gone — same compiler,
# same flags, same linker semantics across every artifact.

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: "Rust target triple (e.g. x86_64-unknown-linux-musl)"
      binary_ext:
        required: false
        type: string
        default: ""
        description: "Binary extension (.exe for Windows, empty otherwise)"
      ref:
        required: false
        type: string
        default: ""
        description: "Git ref to build (branch, tag, or SHA)"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  build:
    name: Build (${{ inputs.target }})
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      # `linker: platform-default` opts out of setup-soldr's `fast` linker
      # override. SOLDR_LINKER=fast injects rust-lld as the cargo target
      # linker which defaults to the host arch (x86_64) and fails to link
      # aarch64 object files (incompatible with elf64-x86-64). zigbuild's
      # `zig cc` wrapper needs to own the toolchain end-to-end on cross
      # lanes; the xwin lane gets its MSVC linker from soldr's cargo
      # front door regardless.
      - name: Setup soldr
        id: setup-soldr
        uses: zackees/setup-soldr@v0.9.62
        with:
          cache: true
          build-cache: true
          target-cache: true
          prebuild-deps: none
          linker: platform-default
          # Native release builds produce a payload larger than the 512 MiB
          # action default (issue #400). Raise the soft warn threshold; hard
          # cap stays at the action default (6 GiB).
          cache-payload-warn-bytes: 2GiB
          cache-key-suffix: native-${{ inputs.target }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # rust-toolchain.toml pins 1.94.1; ensure the target stdlib is
      # installed for the pinned toolchain.
      - name: Add Rust target
        run: rustup target add ${{ inputs.target }}

      # Pre-install cargo-zigbuild / cargo-xwin via taiki-e/install-action
      # so soldr's cargo front door takes its PATH-first deferral branch
      # (avoids fanning out unauthenticated GitHub API calls across the
      # release matrix and getting 403'd).
      - name: Install cross-compile cargo subcommand
        uses: taiki-e/install-action@v2
        with:
          tool: ${{ contains(inputs.target, 'pc-windows-msvc') && 'cargo-xwin' || 'cargo-zigbuild' }}

      # zig is needed for cargo-zigbuild lanes (Linux + macOS). xwin lanes
      # don't need zig — cargo-xwin uses cargo's built-in MSVC support
      # plus a soldr-managed LLVM toolchain bootstrap.
      - name: Install zig (zigbuild lanes only)
        if: ${{ !contains(inputs.target, 'pc-windows-msvc') }}
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      # llvm-strip is universal (ELF + Mach-O); zip is needed for the
      # windows-msvc archive path downstream.
      - name: Install llvm + zip
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends llvm zip

      # CLI binaries:
      #   * windows-msvc -> `soldr cargo xwin build --release`
      #   * linux-musl   -> `soldr cargo zigbuild --release` (static, no glibc dep)
      #   * macos/other  -> `soldr cargo zigbuild --release`
      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.target }}" == *-pc-windows-msvc ]]; then
            soldr cargo xwin build --release --target ${{ inputs.target }} \
              -p fbuild-cli \
              -p fbuild-daemon
          else
            soldr cargo zigbuild --release --target ${{ inputs.target }} \
              -p fbuild-cli \
              -p fbuild-daemon
          fi

      # PyO3 extension — built for ALL targets, including cross-compiled.
      # Notes:
      #   - PYO3_NO_PYTHON=1 + abi3-py310 feature lets pyo3-build-config skip
      #     the host interpreter lookup on cross builds.
      #   - For Linux: build against `<arch>-unknown-linux-gnu.2.17` so the
      #     manylinux_2_17 wheel actually runs on glibc 2.17+. The CLI
      #     binaries stay on musl for static-link portability.
      #   - For macOS: zigbuild against the target directly.
      #   - For Windows MSVC: xwin against the target directly.
      - name: Build Python extension
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_TARGET_DIR="target/python-extension"
          if [[ "${{ inputs.target }}" == *-pc-windows-msvc ]]; then
            PYO3_NO_PYTHON=1 soldr cargo xwin build --release \
              --target-dir "${PYTHON_TARGET_DIR}" \
              --target ${{ inputs.target }} -p fbuild-python \
              --features extension-module
          elif [[ "${{ inputs.target }}" == *-unknown-linux-* ]]; then
            TARGET="${{ inputs.target }}"
            ARCH="${TARGET%%-*}"
            PYO3_TARGET="${ARCH}-unknown-linux-gnu"
            rustup target add "$PYO3_TARGET"
            PYO3_NO_PYTHON=1 soldr cargo zigbuild --release \
              --target-dir "${PYTHON_TARGET_DIR}" \
              --target "${PYO3_TARGET}.2.17" -p fbuild-python \
              --features extension-module
          else
            PYO3_NO_PYTHON=1 soldr cargo zigbuild --release \
              --target-dir "${PYTHON_TARGET_DIR}" \
              --target ${{ inputs.target }} -p fbuild-python \
              --features extension-module
          fi

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_TARGET_DIR="target/python-extension"
          mkdir -p staging
          cp target/${{ inputs.target }}/release/fbuild${{ inputs.binary_ext }} staging/
          cp target/${{ inputs.target }}/release/fbuild-daemon${{ inputs.binary_ext }} staging/

          # Stage Python extension — location depends on how it was built.
          if [[ "${{ inputs.target }}" == *-pc-windows-msvc ]]; then
            for ext_src in \
              "${PYTHON_TARGET_DIR}/${{ inputs.target }}/release/_native.dll" \
              "${PYTHON_TARGET_DIR}/release/_native.dll"; do
              [ -f "$ext_src" ] && cp "$ext_src" staging/_native.pyd && break
            done
          elif [[ "${{ inputs.target }}" == *-unknown-linux-* ]]; then
            TARGET="${{ inputs.target }}"
            ARCH="${TARGET%%-*}"
            ext_src="${PYTHON_TARGET_DIR}/${ARCH}-unknown-linux-gnu.2.17/release/lib_native.so"
            [ -f "$ext_src" ] || ext_src="${PYTHON_TARGET_DIR}/${ARCH}-unknown-linux-gnu/release/lib_native.so"
            [ -f "$ext_src" ] && cp "$ext_src" staging/_native.abi3.so
          elif [[ "${{ inputs.target }}" == *-apple-darwin ]]; then
            ext_src="${PYTHON_TARGET_DIR}/${{ inputs.target }}/release/lib_native.dylib"
            [ -f "$ext_src" ] && cp "$ext_src" staging/_native.abi3.so
          fi

          # Fail fast if the extension is missing — we expect it on all targets.
          if [[ "${{ inputs.target }}" == *-pc-windows-msvc ]]; then
            [ -f staging/_native.pyd ] || { echo "ERROR: _native.pyd missing"; exit 1; }
          else
            [ -f staging/_native.abi3.so ] || { echo "ERROR: _native.abi3.so missing"; exit 1; }
          fi

          # Strip with llvm-strip — universal across ELF + Mach-O. Skip
          # Windows PE (cross-compiled, debug info already split).
          if [[ "${{ inputs.target }}" != *-pc-windows-msvc ]]; then
            llvm-strip staging/fbuild 2>/dev/null || true
            llvm-strip staging/fbuild-daemon 2>/dev/null || true
            llvm-strip staging/_native.abi3.so 2>/dev/null || true
          fi

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd staging
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attest native artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: staging/SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ inputs.target }}
          path: staging/
          if-no-files-found: error
