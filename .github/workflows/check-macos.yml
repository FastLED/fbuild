name: Check macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Setup zccache
        shell: bash
        run: |
          pip install zccache
          # macOS installs to Python framework bin; chmod using sys.prefix
          chmod +x "$(python3 -c 'import sys; print(sys.prefix)')/bin/zccache" 2>/dev/null || true
          find ~/.local -name 'zccache*' -type f -exec chmod +x {} + 2>/dev/null || true
          zccache start
      - name: Check
        run: cargo check --workspace --all-targets
        env:
          RUSTC_WRAPPER: zccache
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        env:
          RUSTC_WRAPPER: zccache
      - name: Test
        run: cargo test --workspace
        env:
          RUSTC_WRAPPER: zccache
