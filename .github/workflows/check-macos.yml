name: Check macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Setup zccache
        shell: bash
        run: |
          pip install zccache
          python3 -c "
          import os, sys, stat, glob, zccache
          # Fix entry-point scripts
          for p in [
              os.path.join(sys.prefix, 'bin', 'zccache'),
              os.path.join(sys.base_prefix, 'bin', 'zccache'),
              *glob.glob('/Library/Frameworks/Python.framework/Versions/*/bin/zccache'),
              os.path.expanduser('~/.local/bin/zccache'),
          ]:
              if os.path.exists(p):
                  os.chmod(p, 0o755)
                  print(f'chmod 755 {p}')
          # Fix bundled daemon binary inside the package
          pkg_dir = os.path.dirname(zccache.__file__)
          for root, dirs, files in os.walk(pkg_dir):
              for f in files:
                  fp = os.path.join(root, f)
                  st = os.stat(fp)
                  if not (st.st_mode & stat.S_IEXEC):
                      os.chmod(fp, st.st_mode | stat.S_IEXEC | stat.S_IXGRP | stat.S_IXOTH)
                      print(f'chmod +x {fp}')
          "
          zccache start
      - name: Check
        run: cargo check --workspace --all-targets
        env:
          RUSTC_WRAPPER: zccache
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        env:
          RUSTC_WRAPPER: zccache
      - name: Test
        run: cargo test --workspace
        env:
          RUSTC_WRAPPER: zccache
