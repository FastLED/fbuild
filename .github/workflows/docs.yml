name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - name: Setup soldr
        id: setup-soldr
        uses: zackees/setup-soldr@v0
        with:
          cache: true
          build-cache: true
          target-cache: true

      - name: Build docs
        run: soldr cargo doc --workspace --no-deps
