name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - name: Setup soldr
        id: setup-soldr
        uses: zackees/setup-soldr@v0.9.55
        with:
          cache: true
          build-cache: true
          target-cache: true
          prebuild-deps: none

      - name: Build docs
        run: soldr cargo doc --workspace --no-deps
