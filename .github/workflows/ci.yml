name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Setup zccache
        shell: bash
        run: |
          pip install zccache
          find ~/.local -name 'zccache*' -type f -exec chmod +x {} + 2>/dev/null || true
          zccache start
      - name: Check
        run: cargo check --workspace --all-targets
        env:
          RUSTC_WRAPPER: zccache
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        env:
          RUSTC_WRAPPER: zccache
      - name: Test
        run: cargo test --workspace
        env:
          RUSTC_WRAPPER: zccache

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV (1.75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.75.0
      - uses: Swatinem/rust-cache@v2
      - name: Setup zccache
        run: |
          pip install zccache
          find ~/.local -name 'zccache*' -type f -exec chmod +x {} + 2>/dev/null || true
          zccache start
      - name: Check MSRV
        run: cargo check --workspace
        env:
          RUSTC_WRAPPER: zccache

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Setup zccache
        run: |
          pip install zccache
          find ~/.local -name 'zccache*' -type f -exec chmod +x {} + 2>/dev/null || true
          zccache start
      - name: Build docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTC_WRAPPER: zccache

  validate-boards:
    name: Validate Board Definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Install PlatformIO platforms
        run: |
          pio pkg install -g -p "platformio/atmelavr"
          pio pkg install -g -p "platformio/espressif32"
          pio pkg install -g -p "platformio/espressif8266"
          pio pkg install -g -p "platformio/teensy"
          pio pkg install -g -p "platformio/ststm32"
          pio pkg install -g -p "platformio/raspberrypi"
          pio pkg install -g -p "platformio/atmelmegaavr"
      - name: Validate board JSONs match PlatformIO
        run: python ci/validate_boards.py
