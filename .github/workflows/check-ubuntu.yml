name: Check Ubuntu

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: Check (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
      - name: Setup soldr
        id: setup-soldr
        uses: zackees/setup-soldr@v0.9.55
        with:
          cache: true
          build-cache: true
          target-cache: true
          prebuild-deps: none

      - name: Check
        run: soldr cargo check --workspace --all-targets
      - name: Clippy
        run: soldr cargo clippy --workspace --all-targets -- -D warnings
      - name: Lint subprocess spawns
        run: uv run python ci/find_direct_subprocess.py --fail
      - name: Test
        run: soldr cargo test --workspace
