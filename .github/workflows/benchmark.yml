name: FastLED examples compile benchmark

# Self-contained benchmark living on an orphan branch (bench/fastled-examples).
#
# Goal: measure wall-clock to compile the FastLED examples/ set for one board,
# broken out by phase (pip install, toolchain fetch, compile), so we can tell
# where the time actually goes — for both cold-cache and warm-cache regimes.
#
# Tracked by: https://github.com/FastLED/fbuild/issues/112
#
# Trigger model
# -------------
# Every push to this branch runs the benchmark. workflow_dispatch would require
# the workflow to live on the default branch (main), which defeats the point of
# an orphan branch. Runs are parameterized via `bench.config` at the root of
# this branch — edit, commit, push to re-run.

on:
  push:
    branches:
      - bench/fastled-examples

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BENCH_TIMINGS: ${{ github.workspace }}/phase-timings.tsv
    steps:
      - name: Checkout benchmark branch
        uses: actions/checkout@v4

      - name: Load bench.config
        id: bench_config
        run: |
          set -euo pipefail
          if [ ! -f bench.config ]; then
            echo "bench.config not found; using defaults" >&2
            BOARD=uno
            FASTLED_REF=master
            EXAMPLES=all
            CACHE_BUST=
          else
            # shellcheck disable=SC1091
            . ./bench.config
          fi
          echo "BENCH_BOARD=${BOARD}" >> "$GITHUB_ENV"
          echo "BENCH_REF=${FASTLED_REF}" >> "$GITHUB_ENV"
          echo "BENCH_EXAMPLES=${EXAMPLES}" >> "$GITHUB_ENV"
          echo "BENCH_CACHE_BUST=${CACHE_BUST}" >> "$GITHUB_ENV"
          echo "board=${BOARD}" >> "$GITHUB_OUTPUT"
          echo "ref=${FASTLED_REF}" >> "$GITHUB_OUTPUT"
          echo "examples=${EXAMPLES}" >> "$GITHUB_OUTPUT"
          echo "cache_bust=${CACHE_BUST}" >> "$GITHUB_OUTPUT"
          echo "Resolved: board=${BOARD} ref=${FASTLED_REF} examples=${EXAMPLES} cache_bust=${CACHE_BUST}"

      - name: Init phase timings file
        run: |
          printf 'phase\tseconds\n' > "$BENCH_TIMINGS"
          echo "BENCH_JOB_START=$(date +%s.%N)" >> "$GITHUB_ENV"

      # --- phase: checkout fbuild main (for the `setup` composite action) ---
      - name: Phase - checkout fbuild main (for setup action)
        run: |
          t0=$(date +%s.%N)
          git clone --depth 1 --branch main https://github.com/FastLED/fbuild.git fbuild-src
          t1=$(date +%s.%N)
          printf 'checkout_fbuild\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"

      # --- phase: setup fbuild (python + pip install + cache restore) ---
      - name: Phase - set up fbuild (install + cache restore)
        id: fbuild_setup
        uses: ./fbuild-src/.github/actions/setup
        with:
          cache-version: "bench-v1-${{ steps.bench_config.outputs.cache_bust }}"
          cache-key-extra: "${{ steps.bench_config.outputs.board }}-${{ steps.bench_config.outputs.ref }}"

      - name: Phase - record fbuild-setup cache-hit
        run: |
          echo "fbuild cache-hit: ${{ steps.fbuild_setup.outputs.cache-hit }}"
          printf 'fbuild_cache_hit\t%s\n' "${{ steps.fbuild_setup.outputs.cache-hit }}" >> "$BENCH_TIMINGS"

      # --- phase: clone FastLED ---
      - name: Phase - clone FastLED
        run: |
          t0=$(date +%s.%N)
          # Try shallow-clone-at-ref first; fall back to full clone + checkout.
          if ! git clone --depth 1 --branch "$BENCH_REF" \
                 https://github.com/FastLED/FastLED.git fastled 2>/dev/null; then
            rm -rf fastled
            git clone https://github.com/FastLED/FastLED.git fastled
            (cd fastled && git checkout "$BENCH_REF")
          fi
          t1=$(date +%s.%N)
          printf 'clone_fastled\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"
          echo "FastLED HEAD: $(cd fastled && git rev-parse HEAD)"

      # --- phase: install uv + uv sync .venv for FastLED's compile script ---
      - name: Phase - install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: "0.8.0"

      - name: Phase - uv sync FastLED venv
        working-directory: fastled
        run: |
          t0=$(date +%s.%N)
          if [ -x ./install ]; then
            ./install || uv sync
          else
            uv sync
          fi
          t1=$(date +%s.%N)
          printf 'uv_sync\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"

      # --- phase: compile ---
      - name: Phase - compile examples
        working-directory: fastled
        run: |
          t0=$(date +%s.%N)
          set -o pipefail
          rc=0
          ./compile --no-interactive --no-parallel \
            --log-failures failures \
            --max-failures 3 \
            "$BENCH_BOARD" $BENCH_EXAMPLES 2>&1 | tee compile.log || rc=$?
          t1=$(date +%s.%N)
          printf 'compile\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"
          exit "$rc"

      # --- final: job-level total + job summary ---
      - name: Phase - job total + summary
        if: always()
        run: |
          t1=$(date +%s.%N)
          total=$(awk "BEGIN{print $t1-$BENCH_JOB_START}")
          printf 'job_total\t%.3f\n' "$total" >> "$BENCH_TIMINGS"

          {
            echo "## Benchmark: ${BENCH_BOARD} ${BENCH_EXAMPLES} @ ${BENCH_REF}"
            echo ""
            echo "- commit: \`${{ github.sha }}\`"
            echo "- cache-hit: \`${{ steps.fbuild_setup.outputs.cache-hit }}\`"
            echo "- cache-bust: \`${BENCH_CACHE_BUST:-<none>}\`"
            echo ""
            echo "| phase | seconds |"
            echo "|-------|--------:|"
            awk -F'\t' 'NR>1 && $1!="fbuild_cache_hit" {printf "| %s | %s |\n", $1, $2}' "$BENCH_TIMINGS"
          } >> "$GITHUB_STEP_SUMMARY"

          cat "$BENCH_TIMINGS"

      - name: Upload phase timings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-timings-${{ env.BENCH_BOARD }}-${{ env.BENCH_REF }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.BENCH_TIMINGS }}
          if-no-files-found: warn
