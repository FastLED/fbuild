name: FastLED examples compile benchmark

# Self-contained benchmark living on an orphan branch (bench/fastled-examples).
#
# Goal: measure wall-clock to compile the FastLED examples/ set for one board,
# broken out by phase, for both cold-cache and warm-cache regimes.
#
# Tracked by: https://github.com/FastLED/fbuild/issues/112

on:
  push:
    branches:
      - bench/fastled-examples

concurrency:
  group: fastled-examples-benchmark
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      BENCH_TIMINGS: ${{ github.workspace }}/phase-timings.tsv
      BENCH_CACHE_TARBALL: ${{ github.workspace }}/bench-cache.tar.zst
    steps:
      - name: Checkout benchmark branch
        uses: actions/checkout@v4

      - name: Load bench.config
        id: bench_config
        run: |
          set -euo pipefail
          if [ ! -f bench.config ]; then
            BOARD=uno; FASTLED_REF=master; EXAMPLES=all; CACHE_BUST=
          else
            # shellcheck disable=SC1091
            . ./bench.config
          fi
          echo "BENCH_BOARD=${BOARD}" >> "$GITHUB_ENV"
          echo "BENCH_REF=${FASTLED_REF}" >> "$GITHUB_ENV"
          echo "BENCH_EXAMPLES=${EXAMPLES}" >> "$GITHUB_ENV"
          echo "BENCH_CACHE_BUST=${CACHE_BUST}" >> "$GITHUB_ENV"
          echo "board=${BOARD}" >> "$GITHUB_OUTPUT"
          echo "ref=${FASTLED_REF}" >> "$GITHUB_OUTPUT"
          echo "examples=${EXAMPLES}" >> "$GITHUB_OUTPUT"
          echo "cache_bust=${CACHE_BUST}" >> "$GITHUB_OUTPUT"
          echo "Resolved: board=${BOARD} ref=${FASTLED_REF} examples=${EXAMPLES} cache_bust=${CACHE_BUST}"

      - name: Init phase timings
        run: |
          printf 'phase\tseconds\n' > "$BENCH_TIMINGS"
          echo "BENCH_JOB_START=$(date +%s.%N)" >> "$GITHUB_ENV"

      # iter7 diagnostic: surface repo-wide actions/cache pressure. Iter5's
      # cache-miss-on-back-to-back-run turned out to be repo-wide LRU eviction
      # (9.4GB/10GB pre-iter7) — log this every run so we notice when we
      # hit the wall again.
      - name: "Phase - log repo cache pressure"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          usage=$(gh api repos/${{ github.repository }}/actions/cache/usage 2>/dev/null || echo '{}')
          bytes=$(echo "$usage" | jq -r '.active_caches_size_in_bytes // 0')
          count=$(echo "$usage" | jq -r '.active_caches_count // 0')
          gb=$(awk "BEGIN{printf \"%.2f\", $bytes/1073741824}")
          echo "repo actions/cache usage: ${gb}GB across ${count} caches (limit: 10GB)"

      # -------- system setup (python, soldr, uv) --------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Phase - setup soldr"
        id: soldr-setup
        uses: zackees/setup-soldr@v0
        with:
          version: "0.7.11"
          cache: "false"
          build-cache: "false"

      - name: "Phase - configure zccache store"
        run: |
          set -euo pipefail
          zccache_store='${{ steps.soldr-setup.outputs.build-cache-path }}'
          if [ -z "${zccache_store}" ]; then
            echo "setup-soldr did not expose build-cache-path" >&2
            exit 1
          fi
          mkdir -p "${zccache_store}"
          echo "ZCCACHE_CACHE_DIR=${zccache_store}" >> "$GITHUB_ENV"
          echo "ZCCACHE_DIR=${zccache_store}" >> "$GITHUB_ENV"
          echo "zccache store: ${zccache_store}"

      - name: "Phase - clone FastLED"
        run: |
          t0=$(date +%s.%N)
          if ! git clone --depth 1 --branch "$BENCH_REF" \
                 https://github.com/FastLED/FastLED.git fastled 2>/dev/null; then
            rm -rf fastled
            git clone https://github.com/FastLED/FastLED.git fastled
            (cd fastled && git checkout "$BENCH_REF")
          fi
          mkdir -p fastled/.build
          t1=$(date +%s.%N)
          printf 'clone_fastled\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"
          echo "FastLED HEAD: $(cd fastled && git rev-parse HEAD)"

      # -------- iter7: artifact-based warm restore --------
      # Why not actions/cache? FastLED/fbuild has a 9.4GB cache footprint on
      # main (5x toolchain caches @ 1.7-2.4GB each). The repo hits the 10GB
      # LRU eviction wall constantly, evicting our small bench cache within
      # ~20 minutes. Artifacts have a separate quota and 90-day retention,
      # so a stable warm cache survives between runs.
      - name: "Phase - warm restore from prior artifact"
        id: warm_restore
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: bench-cache-${{ env.BENCH_BOARD }}-${{ env.BENCH_REF }}-${{ steps.soldr-setup.outputs.soldr-version }}-${{ steps.bench_config.outputs.cache_bust }}
        run: |
          set -euo pipefail
          t0=$(date +%s.%N)
          warm=false
          src_run=

          # Find most recent successful run on this branch (excluding self) that has the artifact.
          prev_run_id=$(gh run list \
            --workflow=benchmark.yml \
            --branch bench/fastled-examples \
            --status success \
            --limit 20 \
            --json databaseId \
            --jq '.[] | .databaseId' \
            | awk -v cur="${{ github.run_id }}" '$1 != cur {print}' \
            | head -1 || true)

          if [ -z "${prev_run_id:-}" ]; then
            echo "no prior successful run — cold"
          else
            echo "trying to restore from run ${prev_run_id} (artifact ${ARTIFACT_NAME})"
            mkdir -p /tmp/bench-restore
            if gh run download "${prev_run_id}" \
                 --repo "${{ github.repository }}" \
                 --name "${ARTIFACT_NAME}" \
                 --dir /tmp/bench-restore 2>&1; then
              tarball=$(find /tmp/bench-restore -type f -name '*.tar.zst' | head -1)
              if [ -n "${tarball}" ] && [ -s "${tarball}" ]; then
                echo "extracting $(du -h "${tarball}" | cut -f1) tarball from run ${prev_run_id}"
                tar --use-compress-program='zstd -d' -xPf "${tarball}"
                warm=true
                src_run="${prev_run_id}"
              else
                echo "artifact downloaded but no tarball found"
              fi
            else
              echo "no matching artifact on run ${prev_run_id}"
            fi
            rm -rf /tmp/bench-restore
          fi

          t1=$(date +%s.%N)
          printf 'warm_restore\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"
          printf 'warm_restore_hit\t%s\n' "$warm" >> "$BENCH_TIMINGS"
          printf 'warm_restore_source_run\t%s\n' "${src_run:-<none>}" >> "$BENCH_TIMINGS"
          echo "warm=${warm}" >> "$GITHUB_OUTPUT"
          echo "source_run=${src_run}" >> "$GITHUB_OUTPUT"

          echo "=== post-restore footprint ==="
          for d in ~/.fbuild ~/.fastled/global_cache fastled/.build/pio/${BENCH_BOARD} "${ZCCACHE_CACHE_DIR}"; do
            if [ -d "$d" ]; then
              printf '  %s: %s\n' "$d" "$(du -sh "$d" 2>/dev/null | cut -f1)"
            else
              printf '  %s: (missing)\n' "$d"
            fi
          done

      - name: "Phase - install uv"
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: "0.8.0"

      - name: "Phase - uv sync FastLED venv"
        working-directory: fastled
        run: |
          t0=$(date +%s.%N)
          if [ -x ./install ]; then
            ./install || uv sync
          else
            uv sync
          fi
          .venv/bin/fbuild --version
          t1=$(date +%s.%N)
          printf 'uv_sync\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"

      - name: "Phase - compile examples"
        working-directory: fastled
        run: |
          t0=$(date +%s.%N)
          set -o pipefail
          rc=0
          ./compile --no-interactive --no-parallel \
            --log-failures failures \
            --max-failures 3 \
            "$BENCH_BOARD" $BENCH_EXAMPLES 2>&1 | tee compile.log || rc=$?
          t1=$(date +%s.%N)
          printf 'compile\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"
          echo "compile exit=$rc"
          exit "$rc"

      - name: "Phase - post-compile cache footprint"
        if: always()
        run: |
          echo "=== post-compile cache footprint ==="
          for d in ~/.fbuild ~/.fastled/global_cache fastled/.build/pio/${BENCH_BOARD} "${ZCCACHE_CACHE_DIR}"; do
            if [ -d "$d" ]; then
              printf '  %s: %s\n' "$d" "$(du -sh "$d" 2>/dev/null | cut -f1)"
            else
              printf '  %s: (missing)\n' "$d"
            fi
          done

      - name: "Phase - pack cache tarball"
        if: success()
        run: |
          set -euo pipefail
          t0=$(date +%s.%N)
          paths=()
          for p in "$HOME/.fbuild" "$HOME/.fastled/global_cache" \
                   "$GITHUB_WORKSPACE/fastled/.build/pio/${BENCH_BOARD}" \
                   "${UV_CACHE_DIR}" \
                   "${ZCCACHE_CACHE_DIR}"; do
            if [ -d "$p" ]; then paths+=("$p"); fi
          done
          if [ "${#paths[@]}" -eq 0 ]; then
            echo "no cache dirs to pack" >&2
            exit 1
          fi
          # iter9: pack UV_CACHE_DIR (content-addressed wheel cache) instead of
          # fastled/.venv. The .venv approach (iter8b) was 22s -> <5s on warm but
          # broke entirely on the first warm rerun: a venv carries absolute paths
          # into pyvenv.cfg and bin/python that don't survive a runner change
          # (ModuleNotFoundError: No module named 'encodings' from a Python interp
          # that no longer exists on the new runner). The wheel cache IS portable
          # — uv sync replays it locally without network — so warm uv_sync stays
          # short while remaining structurally sound. See FastLED/fbuild#112.
          tar --use-compress-program='zstd -T0 -3' -cPf "$BENCH_CACHE_TARBALL" "${paths[@]}"
          t1=$(date +%s.%N)
          printf 'pack_cache\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"
          ls -lh "$BENCH_CACHE_TARBALL"

      - name: "Phase - upload cache artifact"
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bench-cache-${{ env.BENCH_BOARD }}-${{ env.BENCH_REF }}-${{ steps.soldr-setup.outputs.soldr-version }}-${{ steps.bench_config.outputs.cache_bust }}
          path: ${{ env.BENCH_CACHE_TARBALL }}
          retention-days: 30
          if-no-files-found: error
          overwrite: true

      - name: "Phase - job total + summary"
        if: always()
        run: |
          t1=$(date +%s.%N)
          total=$(awk "BEGIN{print $t1-$BENCH_JOB_START}")
          printf 'job_total\t%.3f\n' "$total" >> "$BENCH_TIMINGS"

          {
            echo "## Benchmark: ${BENCH_BOARD} ${BENCH_EXAMPLES} @ ${BENCH_REF}"
            echo ""
            echo "- run: \`${{ github.run_id }}\` attempt \`${{ github.run_attempt }}\`"
            echo "- commit: \`${{ github.sha }}\`"
            echo "- warm-restore hit: \`${{ steps.warm_restore.outputs.warm }}\` (source run \`${{ steps.warm_restore.outputs.source_run }}\`)"
            echo "- cache-bust: \`${BENCH_CACHE_BUST:-<none>}\`"
            echo ""
            echo "| phase | seconds |"
            echo "|-------|--------:|"
            awk -F'\t' 'NR>1 && $1 !~ /^warm_restore_(hit|source_run)$/ {printf "| %s | %s |\n", $1, $2}' "$BENCH_TIMINGS"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "=== phase-timings.tsv ==="
          cat "$BENCH_TIMINGS"

      - name: "Upload phase timings artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-timings-${{ env.BENCH_BOARD }}-${{ env.BENCH_REF }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.BENCH_TIMINGS }}
          if-no-files-found: warn
