name: FastLED examples compile benchmark

# Self-contained benchmark living on an orphan branch (bench/fastled-examples).
#
# Goal: measure wall-clock to compile the FastLED examples/ set for one board,
# broken out by phase, for both cold-cache and warm-cache regimes.
#
# Tracked by: https://github.com/FastLED/fbuild/issues/112

on:
  push:
    branches:
      - bench/fastled-examples

concurrency:
  group: fastled-examples-benchmark
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      BENCH_TIMINGS: ${{ github.workspace }}/phase-timings.tsv
    steps:
      - name: Checkout benchmark branch
        uses: actions/checkout@v4

      - name: Load bench.config
        id: bench_config
        run: |
          set -euo pipefail
          if [ ! -f bench.config ]; then
            BOARD=uno; FASTLED_REF=master; EXAMPLES=all; CACHE_BUST=
          else
            # shellcheck disable=SC1091
            . ./bench.config
          fi
          echo "BENCH_BOARD=${BOARD}" >> "$GITHUB_ENV"
          echo "BENCH_REF=${FASTLED_REF}" >> "$GITHUB_ENV"
          echo "BENCH_EXAMPLES=${EXAMPLES}" >> "$GITHUB_ENV"
          echo "BENCH_CACHE_BUST=${CACHE_BUST}" >> "$GITHUB_ENV"
          echo "board=${BOARD}" >> "$GITHUB_OUTPUT"
          echo "ref=${FASTLED_REF}" >> "$GITHUB_OUTPUT"
          echo "examples=${EXAMPLES}" >> "$GITHUB_OUTPUT"
          echo "cache_bust=${CACHE_BUST}" >> "$GITHUB_OUTPUT"
          echo "Resolved: board=${BOARD} ref=${FASTLED_REF} examples=${EXAMPLES} cache_bust=${CACHE_BUST}"

      - name: Init phase timings
        run: |
          printf 'phase\tseconds\n' > "$BENCH_TIMINGS"
          echo "BENCH_JOB_START=$(date +%s.%N)" >> "$GITHUB_ENV"

      # -------- system setup (python, fbuild, uv) --------
      - name: "Phase - setup-python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Phase - pip install fbuild"
        run: |
          t0=$(date +%s.%N)
          python -m pip install --upgrade pip
          python -m pip install fbuild
          fbuild --version 2>&1 || true
          t1=$(date +%s.%N)
          printf 'pip_install_fbuild\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"

      - name: "Phase - compute fbuild content hash"
        id: fbuild_hash
        run: |
          FBUILD_HASH=$(python - <<'PY'
          import hashlib, importlib.metadata as md
          dist = md.distribution("fbuild")
          record = dist.read_text("RECORD") or f"{dist.version}\n{dist.read_text('METADATA') or ''}"
          print(hashlib.sha256(record.encode()).hexdigest()[:16])
          PY
          )
          echo "fbuild-hash=${FBUILD_HASH}" >> "$GITHUB_OUTPUT"
          echo "fbuild content hash: ${FBUILD_HASH}"

      # -------- clone FastLED (needs to happen BEFORE cache restore because the
      #         cache writes into fastled/.build/ which only exists after clone) --------
      - name: "Phase - clone FastLED"
        run: |
          t0=$(date +%s.%N)
          if ! git clone --depth 1 --branch "$BENCH_REF" \
                 https://github.com/FastLED/FastLED.git fastled 2>/dev/null; then
            rm -rf fastled
            git clone https://github.com/FastLED/FastLED.git fastled
            (cd fastled && git checkout "$BENCH_REF")
          fi
          # Make sure the cache target subdir exists so actions/cache can write into it.
          mkdir -p fastled/.build
          t1=$(date +%s.%N)
          printf 'clone_fastled\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"
          echo "FastLED HEAD: $(cd fastled && git rev-parse HEAD)"

      # -------- iteration 1: cache the directories fbuild actually writes to --------
      # Iteration 0 cached $RUNNER_TEMP/fbuild-cache, which was empty. The real
      # state lives in:
      #   ~/.fbuild/                — fbuild toolchain + daemon state (arch-level)
      #   ~/.fastled/global_cache/  — PlatformIO toolchain downloads
      #   fastled/.build/pio/<board>/ — compile outputs + per-project .fbuild/
      - name: "Phase - restore compile cache"
        id: compile_cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.fbuild
            ~/.fastled/global_cache
            fastled/.build/pio/${{ env.BENCH_BOARD }}
          key: "bench-v2-${{ steps.bench_config.outputs.cache_bust }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.fbuild_hash.outputs.fbuild-hash }}-${{ steps.bench_config.outputs.board }}-${{ steps.bench_config.outputs.ref }}"
          restore-keys: |
            bench-v2-${{ steps.bench_config.outputs.cache_bust }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.fbuild_hash.outputs.fbuild-hash }}-${{ steps.bench_config.outputs.board }}-
            bench-v2-${{ steps.bench_config.outputs.cache_bust }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.fbuild_hash.outputs.fbuild-hash }}-

      - name: "Phase - record cache-restore result"
        run: |
          printf 'compile_cache_hit\t%s\n' "${{ steps.compile_cache.outputs.cache-hit }}" >> "$BENCH_TIMINGS"
          printf 'compile_cache_key_matched\t%s\n' "${{ steps.compile_cache.outputs.cache-matched-key }}" >> "$BENCH_TIMINGS"
          echo "Cache hit: ${{ steps.compile_cache.outputs.cache-hit }}"
          echo "Key matched: ${{ steps.compile_cache.outputs.cache-matched-key }}"
          for d in ~/.fbuild ~/.fastled/global_cache fastled/.build/pio/${BENCH_BOARD}; do
            if [ -d "$d" ]; then
              printf '  %s: %s\n' "$d" "$(du -sh "$d" 2>/dev/null | cut -f1)"
            else
              printf '  %s: (missing)\n' "$d"
            fi
          done

      - name: "Phase - install uv"
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: "0.8.0"

      - name: "Phase - uv sync FastLED venv"
        working-directory: fastled
        run: |
          t0=$(date +%s.%N)
          if [ -x ./install ]; then
            ./install || uv sync
          else
            uv sync
          fi
          t1=$(date +%s.%N)
          printf 'uv_sync\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"

      - name: "Phase - compile examples"
        working-directory: fastled
        run: |
          t0=$(date +%s.%N)
          set -o pipefail
          rc=0
          ./compile --no-interactive --no-parallel \
            --log-failures failures \
            --max-failures 3 \
            "$BENCH_BOARD" $BENCH_EXAMPLES 2>&1 | tee compile.log || rc=$?
          t1=$(date +%s.%N)
          printf 'compile\t%.3f\n' "$(awk "BEGIN{print $t1-$t0}")" >> "$BENCH_TIMINGS"
          echo "compile exit=$rc"
          exit "$rc"

      - name: "Phase - post-compile cache footprint"
        if: always()
        run: |
          echo "=== post-compile cache footprint ==="
          for d in ~/.fbuild ~/.fastled/global_cache fastled/.build/pio/${BENCH_BOARD}; do
            if [ -d "$d" ]; then
              printf '  %s: %s\n' "$d" "$(du -sh "$d" 2>/dev/null | cut -f1)"
            else
              printf '  %s: (missing)\n' "$d"
            fi
          done

      - name: "Phase - save compile cache"
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.fbuild
            ~/.fastled/global_cache
            fastled/.build/pio/${{ env.BENCH_BOARD }}
          key: "bench-v2-${{ steps.bench_config.outputs.cache_bust }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.fbuild_hash.outputs.fbuild-hash }}-${{ steps.bench_config.outputs.board }}-${{ steps.bench_config.outputs.ref }}"

      - name: "Phase - job total + summary"
        if: always()
        run: |
          t1=$(date +%s.%N)
          total=$(awk "BEGIN{print $t1-$BENCH_JOB_START}")
          printf 'job_total\t%.3f\n' "$total" >> "$BENCH_TIMINGS"

          {
            echo "## Benchmark: ${BENCH_BOARD} ${BENCH_EXAMPLES} @ ${BENCH_REF}"
            echo ""
            echo "- run: \`${{ github.run_id }}\` attempt \`${{ github.run_attempt }}\`"
            echo "- commit: \`${{ github.sha }}\`"
            echo "- cache-hit: \`${{ steps.compile_cache.outputs.cache-hit }}\`"
            echo "- cache-bust: \`${BENCH_CACHE_BUST:-<none>}\`"
            echo ""
            echo "| phase | seconds |"
            echo "|-------|--------:|"
            awk -F'\t' 'NR>1 && $1 !~ /^compile_cache_/ {printf "| %s | %s |\n", $1, $2}' "$BENCH_TIMINGS"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "=== phase-timings.tsv ==="
          cat "$BENCH_TIMINGS"

      - name: "Upload phase timings artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-timings-${{ env.BENCH_BOARD }}-${{ env.BENCH_REF }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.BENCH_TIMINGS }}
          if-no-files-found: warn
