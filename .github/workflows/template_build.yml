name: Build Template

on:
  workflow_call:
    inputs:
      workflow-name:
        required: true
        type: string
        description: "Display name for the workflow"
      test-dir:
        required: true
        type: string
        description: "Test directory path (e.g., tests/platform/esp32c6)"
      env-name:
        required: true
        type: string
        description: "Environment name (e.g., esp32c6)"
      firmware-ext:
        required: true
        type: string
        description: "Firmware file extension (bin or hex)"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # setup-soldr's default 5 GiB target free-space guard is too conservative
  # for hosted per-board Linux builds after the runner image and caches load.
  # A 2 GiB hard stop still catches genuinely exhausted runners without
  # failing healthy jobs before the board build starts.
  SOLDR_TARGET_BLOCK_FREE_GB: "2"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup soldr
        id: setup-soldr
        uses: zackees/setup-soldr@v0
        with:
          version: 0.8.23
          # cache-preset: foundation expands to:
          #   build-cache: true, target-cache: false,
          #   cargo-registry-cache: false, prebuild-deps: soldr-cook
          # (setup-soldr v0.9.17+, zackees/setup-soldr#251). One-line
          # equivalent of the explicit per-input config PR #280 introduced;
          # semantics are identical and explicit values still win if you
          # ever need to override one input.
          cache-preset: foundation
          # The Rust build here (`cargo build -p fbuild-cli -p fbuild-daemon`,
          # debug) is board-INDEPENDENT, so cook + build-cache live under a
          # SHARED key across all boards (was ~462MiB × board × SHA before
          # #280 made it coarse).
          prebuild-deps-flags: ""
          # Override foundation's default `prebuild-deps: soldr-cook` — the
          # cook recorded only misses (0 hits) in practice (issue #400 /
          # setup-soldr#377), so skipping it removes a noisy warning and
          # shaves ~20s off cold runs. The build-cache layer still warms
          # the actual `soldr cargo build` step.
          prebuild-deps: none
          # Opt out of the implicit `SOLDR_LINKER=fast` injection so cargo /
          # rust-toolchain.toml stays in charge of linker selection. Silences
          # the routine "defaulting SOLDR_LINKER=fast" warning (issue #400 /
          # setup-soldr#377).
          linker: platform-default
          # Raise the soft warn threshold above the realistic ~1.5–2 GiB
          # zccache payload for this debug build (issue #400). Hard cap
          # `cache-payload-max-bytes` still defaults to 6 GiB.
          cache-payload-warn-bytes: 2GiB
          cache-key-suffix: fbuild-rust-debug

      # Note: standalone `zccache-daemon` no longer runs separately.
      # As of soldr 1.12.11+ (soldr#977 / #980 L1) zccache is embedded
      # into soldr-daemon and the daemon's lifecycle is owned by soldr,
      # not by this workflow. The previous `pkill -f '[z]ccache-daemon'`
      # step is removed because there is no such process to kill —
      # killing the soldr-daemon directly would fight soldr's own
      # ipc shutdown path. See FastLED/fbuild#855.

      - name: Restore fbuild toolchains
        timeout-minutes: 10
        uses: actions/cache/restore@v5
        with:
          path: ~/.fbuild/prod/cache
          key: fbuild-toolchain-${{ runner.os }}-${{ inputs.env-name }}-${{ hashFiles(format('{0}/platformio.ini', inputs.test-dir)) }}
          restore-keys: |
            fbuild-toolchain-${{ runner.os }}-${{ inputs.env-name }}-
            fbuild-toolchain-${{ runner.os }}-

      - name: Restore platform build artifacts
        timeout-minutes: 10
        uses: actions/cache/restore@v5
        with:
          path: ${{ inputs.test-dir }}/.fbuild/build
          key: fbuild-build-${{ runner.os }}-${{ inputs.env-name }}-${{ github.sha }}
          restore-keys: |
            fbuild-build-${{ runner.os }}-${{ inputs.env-name }}-

      - name: Install Linux dependencies
        timeout-minutes: 5
        run: |
          sudo apt-get -o Acquire::http::Timeout=30 -o Acquire::Retries=3 update
          sudo apt-get -o Acquire::http::Timeout=30 -o Acquire::Retries=3 install -y libudev-dev pkg-config

      - name: Install esptool (ESP32 firmware conversion)
        if: inputs.firmware-ext == 'bin'
        timeout-minutes: 3
        run: pip install --timeout 60 esptool

      - name: Build fbuild binaries
        run: |
          soldr cargo build -p fbuild-cli -p fbuild-daemon

      - name: Add fbuild to PATH
        run: echo "${{ github.workspace }}/target/debug" >> $GITHUB_PATH

      - name: Build ${{ inputs.workflow-name }} (quick)
        run: fbuild build ${{ inputs.test-dir }} -e ${{ inputs.env-name }} --quick

      - name: Verify quick firmware output
        # BuildLayout (PR #455, FastLED/fbuild#432) collapses the
        # `<env>` segment when the sketch dir basename == env-name.
        # `tests/platform/lpc845/` (env `lpc845`) → collapses to
        # `.fbuild/build/quick/firmware.<ext>`; but
        # `tests/platform/giga_r1_m7/` (env `giga_r1`) → stays as
        # `.fbuild/build/giga_r1/quick/firmware.<ext>`. Find both
        # layouts so the verify works either way.
        run: |
          firmware=$(find ${{ inputs.test-dir }}/.fbuild/build -type f -name "firmware.${{ inputs.firmware-ext }}" -path "*/quick/*" 2>/dev/null | head -1)
          test -n "$firmware" && test -f "$firmware"
          echo "Quick build successful - firmware.${{ inputs.firmware-ext }} at $firmware"

      - name: Build ${{ inputs.workflow-name }} (release)
        run: fbuild build ${{ inputs.test-dir }} -e ${{ inputs.env-name }} --release

      - name: Verify release firmware output
        run: |
          firmware=$(find ${{ inputs.test-dir }}/.fbuild/build -type f -name "firmware.${{ inputs.firmware-ext }}" -path "*/release/*" 2>/dev/null | head -1)
          test -n "$firmware" && test -f "$firmware"
          echo "Release build successful - firmware.${{ inputs.firmware-ext }} at $firmware"

      - name: Save fbuild toolchains
        if: always()
        timeout-minutes: 10
        uses: actions/cache/save@v5
        with:
          path: ~/.fbuild/prod/cache
          key: fbuild-toolchain-${{ runner.os }}-${{ inputs.env-name }}-${{ hashFiles(format('{0}/platformio.ini', inputs.test-dir)) }}

      - name: Save platform build artifacts
        if: always()
        timeout-minutes: 10
        uses: actions/cache/save@v5
        with:
          path: ${{ inputs.test-dir }}/.fbuild/build
          key: fbuild-build-${{ runner.os }}-${{ inputs.env-name }}-${{ github.sha }}
