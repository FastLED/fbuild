name: Build Template

on:
  workflow_call:
    inputs:
      workflow-name:
        required: true
        type: string
        description: "Display name for the workflow"
      test-dir:
        required: true
        type: string
        description: "Test directory path (e.g., tests/platform/esp32c6)"
      env-name:
        required: true
        type: string
        description: "Environment name (e.g., esp32c6)"
      firmware-ext:
        required: true
        type: string
        description: "Firmware file extension (bin or hex)"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: platform-build-v1
          save-if: "true"

      - name: Restore zccache
        uses: actions/cache/restore@v5
        with:
          path: ~/.zccache
          key: zccache-${{ runner.os }}-${{ inputs.env-name }}-${{ github.sha }}
          restore-keys: |
            zccache-${{ runner.os }}-${{ inputs.env-name }}-
            zccache-${{ runner.os }}-

      - name: Restore fbuild toolchains
        uses: actions/cache/restore@v5
        with:
          path: ~/.fbuild/prod/cache
          key: fbuild-toolchain-${{ runner.os }}-${{ inputs.env-name }}-${{ github.sha }}
          restore-keys: |
            fbuild-toolchain-${{ runner.os }}-${{ inputs.env-name }}-
            fbuild-toolchain-${{ runner.os }}-

      - name: Restore platform build artifacts
        uses: actions/cache/restore@v5
        with:
          path: ${{ inputs.test-dir }}/.fbuild/build
          key: fbuild-build-${{ runner.os }}-${{ inputs.env-name }}-${{ github.sha }}
          restore-keys: |
            fbuild-build-${{ runner.os }}-${{ inputs.env-name }}-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install esptool (ESP32 firmware conversion)
        if: inputs.firmware-ext == 'bin'
        run: pip install esptool

      - name: Setup zccache
        run: |
          pip install zccache
          find ~/.local -name 'zccache*' -type f -exec chmod +x {} + 2>/dev/null || true
          zccache start

      - name: Build fbuild binaries
        run: |
          cargo build -p fbuild-cli -p fbuild-daemon
        env:
          RUSTC_WRAPPER: zccache

      - name: Add fbuild to PATH
        run: echo "${{ github.workspace }}/target/debug" >> $GITHUB_PATH

      - name: Build ${{ inputs.workflow-name }} (quick)
        run: fbuild build ${{ inputs.test-dir }} -e ${{ inputs.env-name }} --quick

      - name: Verify quick firmware output
        run: |
          test -f ${{ inputs.test-dir }}/.fbuild/build/${{ inputs.env-name }}/quick/firmware.${{ inputs.firmware-ext }}
          echo "Quick build successful - firmware.${{ inputs.firmware-ext }} generated"

      - name: Build ${{ inputs.workflow-name }} (release)
        run: fbuild build ${{ inputs.test-dir }} -e ${{ inputs.env-name }} --release

      - name: Verify release firmware output
        run: |
          test -f ${{ inputs.test-dir }}/.fbuild/build/${{ inputs.env-name }}/release/firmware.${{ inputs.firmware-ext }}
          echo "Release build successful - firmware.${{ inputs.firmware-ext }} generated"

      - name: Stop zccache
        if: always()
        shell: bash
        run: zccache stop || true

      - name: Save zccache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/.zccache
          key: zccache-${{ runner.os }}-${{ inputs.env-name }}-${{ github.sha }}

      - name: Save fbuild toolchains
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/.fbuild/prod/cache
          key: fbuild-toolchain-${{ runner.os }}-${{ inputs.env-name }}-${{ github.sha }}

      - name: Save platform build artifacts
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ inputs.test-dir }}/.fbuild/build
          key: fbuild-build-${{ runner.os }}-${{ inputs.env-name }}-${{ github.sha }}
