name: Build nRF52840 DK

on:
  workflow_dispatch: {}
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: ./.github/workflows/template_build.yml
    with:
      workflow-name: "nRF52840 DK"
      test-dir: "tests/platform/nrf52840_dk"
      env-name: "nrf52840_dk"
      firmware-ext: "hex"
