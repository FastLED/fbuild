# Nightly refresh of the `online-data` and `www` branches.
#
# `online-data` (orphan) carries the merged JSON datasets — USB VID:PID name
# resolution and the PlatformIO board catalog — plus their merger scripts.
# `www` (orphan, GH Pages source) carries a day-rotated SQLite database
# (`<YYYY-MM-DD>.db`) built from the same JSON plus the static-site front-end
# that serves it via sql.js. See FastLED/fbuild#718 for the www design.
#
# This workflow file lives on `main` only because GitHub Actions requires
# `schedule` / `workflow_dispatch` to be defined on the default branch.
#
# At runtime the job:
#
#   1. checks out `main` (default) so it can build the `dump_usb_ids`
#      example from `crates/fbuild-core/examples/dump_usb_ids.rs`;
#   2. fetches + worktrees the `online-data` branch into a sibling dir so
#      the merger scripts live at `online-data/tools/{merge_sources,
#      merge_pio_boards,build_manifest}.py`;
#   3. **in parallel** produces:
#        - `usb-ids` Rust crate dump (tier-1 USB-VID source)
#        - two upstream `usb.ids` text mirror fetches
#        - official vendor PID registry supplements
#        - the full PlatformIO board catalog (`pio boards --json-output`)
#      Each source has its own step + `continue-on-error: true` so any
#      single failure is non-fatal — the merger downstream sees only the
#      sources that actually arrived intact;
#   4. runs the USB-VID merger → sorted `usb-vid.json` + conflict log +
#      per-dataset manifest fragment + compact runtime `usb-vids.proto.zstd`;
#   5. runs the PlatformIO board merger → `pio-boards.json` (deep-union
#      with the previously committed copy so transient field drops in
#      `pio boards` don't lose data) + per-dataset manifest fragment;
#   6. assembles the future-forward `manifest.json` from both fragments;
#   7. commits + pushes only if any data file actually changed, with
#      history pruned to 200 commits.
#
# Fault tolerance summary:
#   - Any single source failure → workflow continues with the rest.
#   - USB-VID merger refuses to write below 1000 entries.
#   - PIO merger refuses to write below 1500 boards AND deep-unions with
#     the previously committed data so a feature drop upstream is repaired
#     from history.
#   - All-sources-fail → no commit happens; the existing online-data
#     branch keeps its last good snapshot.
#   - History is pruned to the most recent 200 commits per the design.
#
# Manual trigger: Actions tab → "Update data" → Run workflow.

name: Update data

on:
  schedule:
    # 04:17 UTC daily — off-peak, avoids the top-of-hour stampede on shared
    # GitHub-hosted runners.
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

env:
  ONLINE_BRANCH: online-data
  ONLINE_WORKTREE: ${{ github.workspace }}/.online-data
  BRANCH_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/online-data
  HISTORY_LIMIT: 200
  # www branch (GH Pages source): see FastLED/fbuild#718.
  WWW_BRANCH: www
  WWW_WORKTREE: ${{ github.workspace }}/.www
  # sql.js is downloaded from a pinned release with an SRI check (below)
  # and staged onto the www branch fresh on every run.
  SQLJS_VERSION: "1.10.3"
  SQLJS_BASE_URL: https://github.com/sql-js/sql.js/releases/download/v1.10.3/sqljs-wasm.zip
  # Public site URL (overridden if GitHub Pages is configured elsewhere).
  WEBSITE_URL: https://fastled.github.io/fbuild/

jobs:
  update:
    name: Update online-data datasets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main (default branch)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity for the commit
        run: |
          git config user.name  "fbuild-bot[nightly]"
          git config user.email "fbuild-bot+nightly@users.noreply.github.com"

      - name: Fetch + worktree the online-data branch
        timeout-minutes: 5
        env:
          GIT_HTTP_LOW_SPEED_TIME: "30"
          GIT_HTTP_LOW_SPEED_LIMIT: "1000"
        run: |
          set -euo pipefail
          if git ls-remote --heads origin "${ONLINE_BRANCH}" | grep -q .; then
            git fetch origin "${ONLINE_BRANCH}:${ONLINE_BRANCH}"
            git worktree add "${ONLINE_WORKTREE}" "${ONLINE_BRANCH}"
          else
            echo "::warning::online-data branch missing on remote; bootstrapping empty orphan worktree"
            git worktree add --detach "${ONLINE_WORKTREE}"
            (cd "${ONLINE_WORKTREE}" && git checkout --orphan "${ONLINE_BRANCH}" && git rm -rf . 2>/dev/null || true)
          fi
          mkdir -p "${ONLINE_WORKTREE}/data"
          ls -la "${ONLINE_WORKTREE}"

      - uses: astral-sh/setup-uv@v3

      - name: Setup www worktree (orphan, GH Pages source)
        # Wraps fetch / orphan-bootstrap logic in Python — unit-tested in
        # online-data-tools/test_orchestrators.py.
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/setup_www_worktree.py" \
            --worktree "${WWW_WORKTREE}" --branch "${WWW_BRANCH}"

      - name: Setup soldr
        uses: zackees/setup-soldr@v0.9.66
        with:
          version: "0.8.0"
          cache: true
          build-cache: true
          target-cache: true
          prebuild-deps: none
          linker: platform-default

      # ────────────────────────────────────────────────────────────────────
      # Parallel data-source acquisition. Each fetch is its own step so
      # `steps.<id>.outcome` cleanly attributes blame; the merge step
      # downstream consumes only sources that succeeded. The Rust build
      # is the longest step (~1–2 min cold, seconds warm); the pio dump
      # and curl fetches are each <90 s — the wall-time cost is bounded by
      # the slowest single source.
      # ────────────────────────────────────────────────────────────────────

      - name: Build dump_usb_ids example (USB-VID tier-1)
        id: build-dump
        continue-on-error: true
        run: soldr cargo build --release --example dump_usb_ids -p fbuild-core

      - name: Run dump_usb_ids → /tmp/usb-ids-rs.json
        id: run-dump
        continue-on-error: true
        if: steps.build-dump.outcome == 'success'
        run: |
          set -euo pipefail
          ./target/release/examples/dump_usb_ids > /tmp/usb-ids-rs.json
          wc -l /tmp/usb-ids-rs.json

      - name: Fetch linux-usb.org/usb.ids (USB-VID tier-2)
        id: fetch-linux-usb
        continue-on-error: true
        run: |
          # HTTP only — the linux-usb.org HTTPS endpoint has a SAN mismatch.
          curl --silent --show-error --retry 5 --retry-delay 10 --fail \
            --max-time 90 \
            -o /tmp/linux-usb.txt \
            "http://www.linux-usb.org/usb.ids"
          wc -l /tmp/linux-usb.txt

      - name: Fetch usbids/usbids GitHub mirror (USB-VID tier-3)
        id: fetch-github
        continue-on-error: true
        run: |
          curl --silent --show-error --retry 5 --retry-delay 10 --fail \
            --max-time 90 \
            -o /tmp/usbids-github.txt \
            "https://raw.githubusercontent.com/usbids/usbids/master/usb.ids"
          wc -l /tmp/usbids-github.txt

      - name: Fetch Espressif USB PID registry (USB-VID tier-1 supplement)
        id: fetch-espressif-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_espressif_usb_pids.py" \
            --out /tmp/espressif-usb-pids.json
          wc -l /tmp/espressif-usb-pids.json

      - name: Fetch Raspberry Pi USB PID registry (USB-VID tier-1 supplement)
        id: fetch-raspberrypi-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_raspberrypi_usb_pids.py" \
            --out /tmp/raspberrypi-usb-pids.json
          wc -l /tmp/raspberrypi-usb-pids.json

      - name: Fetch Nordic USB PID supplement (USB-VID tier-1 supplement)
        id: fetch-nordic-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_nordic_usb_pids.py" \
            --out /tmp/nordic-usb-pids.json
          wc -l /tmp/nordic-usb-pids.json

      - name: Fetch Microchip USB PID supplement (USB-VID tier-1 supplement)
        id: fetch-microchip-first-party-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_microchip_usb_pids.py" \
            --tier first-party \
            --out /tmp/microchip-first-party-usb-pids.json
          wc -l /tmp/microchip-first-party-usb-pids.json

      - name: Fetch Arduino USB PID supplement (USB-VID tier-1 supplement)
        id: fetch-arduino-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_arduino_usb_pids.py" \
            --out /tmp/arduino-usb-pids.json
          wc -l /tmp/arduino-usb-pids.json

      - name: Fetch Adafruit USB PID supplement (USB-VID tier-1 supplement)
        id: fetch-adafruit-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_adafruit_usb_pids.py" \
            --out /tmp/adafruit-usb-pids.json
          wc -l /tmp/adafruit-usb-pids.json

      - name: Fetch SparkFun USB PID supplement (USB-VID tier-1 supplement)
        id: fetch-sparkfun-first-party-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_sparkfun_usb_pids.py" \
            --tier first-party \
            --out /tmp/sparkfun-first-party-usb-pids.json
          wc -l /tmp/sparkfun-first-party-usb-pids.json

      - name: Fetch Seeed USB PID supplement (USB-VID tier-1 supplement)
        id: fetch-seeed-first-party-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_seeed_usb_pids.py" \
            --tier first-party \
            --out /tmp/seeed-first-party-usb-pids.json
          wc -l /tmp/seeed-first-party-usb-pids.json

      - name: Fetch FTDI USB PID supplement (USB-VID tier-3 supplement)
        id: fetch-ftdi-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_ftdi_usb_pids.py" \
            --out /tmp/ftdi-usb-pids.json
          wc -l /tmp/ftdi-usb-pids.json

      - name: Fetch WCH USB PID supplement (USB-VID tier-3 supplement)
        id: fetch-wch-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_wch_usb_pids.py" \
            --out /tmp/wch-usb-pids.json
          wc -l /tmp/wch-usb-pids.json

      - name: Fetch Teensy USB PID supplement (USB-VID tier-3 supplement)
        id: fetch-teensy-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_teensy_usb_pids.py" \
            --out /tmp/teensy-usb-pids.json
          wc -l /tmp/teensy-usb-pids.json

      - name: Fetch STM USB PID supplement (USB-VID tier-3 supplement)
        id: fetch-stm-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_stm_usb_pids.py" \
            --out /tmp/stm-usb-pids.json
          wc -l /tmp/stm-usb-pids.json

      - name: Fetch NXP USB PID supplement (USB-VID tier-3 supplement)
        id: fetch-nxp-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_nxp_usb_pids.py" \
            --out /tmp/nxp-usb-pids.json
          wc -l /tmp/nxp-usb-pids.json

      - name: Fetch Silicon Labs USB PID supplement (USB-VID tier-3 supplement)
        id: fetch-silabs-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_silabs_usb_pids.py" \
            --out /tmp/silabs-usb-pids.json
          wc -l /tmp/silabs-usb-pids.json

      - name: Fetch Renesas RA Arduino USB PID rows (USB-VID tier-4 supplement)
        id: fetch-renesas-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_renesas_usb_pids.py" \
            --out /tmp/renesas-usb-pids.json
          wc -l /tmp/renesas-usb-pids.json

      - name: Fetch Microchip supplemental USB PID rows (USB-VID tier-4 supplement)
        id: fetch-microchip-supplemental-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_microchip_usb_pids.py" \
            --tier supplemental \
            --out /tmp/microchip-supplemental-usb-pids.json
          wc -l /tmp/microchip-supplemental-usb-pids.json

      - name: Fetch SparkFun supplemental USB PID rows (USB-VID tier-4 supplement)
        id: fetch-sparkfun-supplemental-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_sparkfun_usb_pids.py" \
            --tier supplemental \
            --out /tmp/sparkfun-supplemental-usb-pids.json
          wc -l /tmp/sparkfun-supplemental-usb-pids.json

      - name: Fetch Seeed supplemental USB PID rows (USB-VID tier-4 supplement)
        id: fetch-seeed-supplemental-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/fetch_seeed_usb_pids.py" \
            --tier supplemental \
            --out /tmp/seeed-supplemental-usb-pids.json
          wc -l /tmp/seeed-supplemental-usb-pids.json

      - name: Extract FastLED board USB PID rows (USB-VID repo-board supplement)
        id: extract-fastled-board-pids
        continue-on-error: true
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/extract_fastled_board_usb_pids.py" \
            --boards-dir "${{ github.workspace }}/crates/fbuild-config/assets/boards/json" \
            --out /tmp/fastled-board-usb-pids.json
          wc -l /tmp/fastled-board-usb-pids.json

      - name: Dump PlatformIO board catalog → /tmp/all_boards.json
        id: dump-pio
        continue-on-error: true
        run: |
          # `dump_platformio.py` declares `platformio` as an inline
          # dependency so `uv run --no-project --script` materializes it
          # in an ephemeral env. No global pio install needed.
          uv run --no-project --script \
            "${ONLINE_WORKTREE}/tools/dump_platformio.py" \
            /tmp/all_boards.json
          # jq isn't on minimal runners — use python for the sanity print.
          uv run --no-project --script - "/tmp/all_boards.json" <<'PY'
          # /// script
          # requires-python = ">=3.10"
          # ///
          import json, sys
          data = json.loads(open(sys.argv[1], encoding="utf-8").read())
          print(f"pio boards: {len(data)} entries")
          PY

      # ────────────────────────────────────────────────────────────────────
      # Per-dataset merge steps. Each writes its own data file + a
      # manifest fragment. The fragments are then consumed by
      # build_manifest.py to assemble the unified manifest.json.
      # ────────────────────────────────────────────────────────────────────

      - name: Merge USB-VID sources
        id: merge-usb
        continue-on-error: true
        run: |
          set -euo pipefail
          args=()
          if [ "${{ steps.fetch-espressif-pids.outcome }}" = "success" ] && [ -s /tmp/espressif-usb-pids.json ]; then
            args+=(--json "espressif-usb-pids=/tmp/espressif-usb-pids.json")
          fi
          if [ "${{ steps.fetch-raspberrypi-pids.outcome }}" = "success" ] && [ -s /tmp/raspberrypi-usb-pids.json ]; then
            args+=(--json "raspberrypi-usb-pids=/tmp/raspberrypi-usb-pids.json")
          fi
          if [ "${{ steps.fetch-nordic-pids.outcome }}" = "success" ] && [ -s /tmp/nordic-usb-pids.json ]; then
            args+=(--json "nordic-usb-pids=/tmp/nordic-usb-pids.json")
          fi
          if [ "${{ steps.fetch-microchip-first-party-pids.outcome }}" = "success" ] && [ -s /tmp/microchip-first-party-usb-pids.json ]; then
            args+=(--json "microchip-first-party-usb-pids=/tmp/microchip-first-party-usb-pids.json")
          fi
          if [ "${{ steps.fetch-arduino-pids.outcome }}" = "success" ] && [ -s /tmp/arduino-usb-pids.json ]; then
            args+=(--json "arduino-usb-pids=/tmp/arduino-usb-pids.json")
          fi
          if [ "${{ steps.fetch-adafruit-pids.outcome }}" = "success" ] && [ -s /tmp/adafruit-usb-pids.json ]; then
            args+=(--json "adafruit-usb-pids=/tmp/adafruit-usb-pids.json")
          fi
          if [ "${{ steps.fetch-sparkfun-first-party-pids.outcome }}" = "success" ] && [ -s /tmp/sparkfun-first-party-usb-pids.json ]; then
            args+=(--json "sparkfun-first-party-usb-pids=/tmp/sparkfun-first-party-usb-pids.json")
          fi
          if [ "${{ steps.fetch-seeed-first-party-pids.outcome }}" = "success" ] && [ -s /tmp/seeed-first-party-usb-pids.json ]; then
            args+=(--json "seeed-first-party-usb-pids=/tmp/seeed-first-party-usb-pids.json")
          fi
          if [ "${{ steps.run-dump.outcome }}" = "success" ] && [ -s /tmp/usb-ids-rs.json ]; then
            args+=(--json "usb-ids-rs=/tmp/usb-ids-rs.json")
          fi
          if [ "${{ steps.fetch-linux-usb.outcome }}" = "success" ] && [ -s /tmp/linux-usb.txt ]; then
            args+=(--txt "linux-usb.org=/tmp/linux-usb.txt")
          fi
          if [ "${{ steps.fetch-github.outcome }}" = "success" ] && [ -s /tmp/usbids-github.txt ]; then
            args+=(--txt "usbids-github=/tmp/usbids-github.txt")
          fi
          if [ "${{ steps.fetch-ftdi-pids.outcome }}" = "success" ] && [ -s /tmp/ftdi-usb-pids.json ]; then
            # FTDI is intentionally after generic sources so mature usb.ids
            # product names win for common bridge PIDs; the supplement fills
            # newer original-FTDI rows that generic sources often lack.
            args+=(--json "ftdi-usb-pids=/tmp/ftdi-usb-pids.json")
          fi
          if [ "${{ steps.fetch-wch-pids.outcome }}" = "success" ] && [ -s /tmp/wch-usb-pids.json ]; then
            # WCH bridge-chip rows are after generic sources for the same
            # reason as FTDI: fill newer chip IDs without replacing mature
            # usb.ids names for older CH34x entries.
            args+=(--json "wch-usb-pids=/tmp/wch-usb-pids.json")
          fi
          if [ "${{ steps.fetch-teensy-pids.outcome }}" = "success" ] && [ -s /tmp/teensy-usb-pids.json ]; then
            # Teensy rows are after generic VOTI/PJRC USB-ID data so legacy
            # names remain stable; this source fills modern Teensyduino PIDs
            # declared in PJRC's current core headers.
            args+=(--json "teensy-usb-pids=/tmp/teensy-usb-pids.json")
          fi
          if [ "${{ steps.fetch-stm-pids.outcome }}" = "success" ] && [ -s /tmp/stm-usb-pids.json ]; then
            # ST rows are after generic sources so existing usb.ids names
            # stay stable while newer ST-LINK products fill in.
            args+=(--json "stm-usb-pids=/tmp/stm-usb-pids.json")
          fi
          if [ "${{ steps.fetch-nxp-pids.outcome }}" = "success" ] && [ -s /tmp/nxp-usb-pids.json ]; then
            # NXP rows are after generic sources so existing usb.ids names
            # stay stable while newer mfgtools ROM-loader PIDs fill in.
            args+=(--json "nxp-usb-pids=/tmp/nxp-usb-pids.json")
          fi
          if [ "${{ steps.fetch-silabs-pids.outcome }}" = "success" ] && [ -s /tmp/silabs-usb-pids.json ]; then
            # Silicon Labs rows are after generic sources so mature usb.ids
            # names for common CP210x bridge PIDs stay stable while the
            # Energy Micro / Silicon Labs debug-interface row fills in.
            args+=(--json "silabs-usb-pids=/tmp/silabs-usb-pids.json")
          fi
          if [ "${{ steps.extract-fastled-board-pids.outcome }}" = "success" ] && [ -s /tmp/fastled-board-usb-pids.json ]; then
            # Local board JSON rows are repo-scope supplements: they fill
            # missing product names for boards fbuild actually carries, but
            # do not replace stronger vendor/generic USB-ID source rows.
            args+=(--json "fastled-board-usb-pids=/tmp/fastled-board-usb-pids.json")
          fi
          if [ "${{ steps.fetch-renesas-pids.outcome }}" = "success" ] && [ -s /tmp/renesas-usb-pids.json ]; then
            # ArduinoCore-renesas board-package rows are deliberately weak:
            # they fill missing Arduino RA board product names after generic
            # USB-ID sources and vendor-owned supplements have won.
            args+=(--json "renesas-usb-pids=/tmp/renesas-usb-pids.json")
          fi
          if [ "${{ steps.fetch-microchip-supplemental-pids.outcome }}" = "success" ] && [ -s /tmp/microchip-supplemental-usb-pids.json ]; then
            # Third-party Microchip/Atmel rows are deliberately weak: they
            # fill gaps only after first-party and generic USB-ID sources.
            args+=(--json "microchip-supplemental-usb-pids=/tmp/microchip-supplemental-usb-pids.json")
          fi
          if [ "${{ steps.fetch-sparkfun-supplemental-pids.outcome }}" = "success" ] && [ -s /tmp/sparkfun-supplemental-usb-pids.json ]; then
            # Third-party SparkFun board-package rows are deliberately weak:
            # they fill gaps only after first-party and generic USB-ID sources.
            args+=(--json "sparkfun-supplemental-usb-pids=/tmp/sparkfun-supplemental-usb-pids.json")
          fi
          if [ "${{ steps.fetch-seeed-supplemental-pids.outcome }}" = "success" ] && [ -s /tmp/seeed-supplemental-usb-pids.json ]; then
            # Third-party Seeed board-package rows are deliberately weak:
            # they fill gaps only after first-party and generic USB-ID sources.
            args+=(--json "seeed-supplemental-usb-pids=/tmp/seeed-supplemental-usb-pids.json")
          fi
          if [ "${#args[@]}" -eq 0 ]; then
            echo "::warning::all USB-VID sources failed; preserving previously committed data"
            exit 1
          fi
          mkdir -p /tmp/fragments
          uv run --no-project --script \
            "${ONLINE_WORKTREE}/tools/merge_sources.py" \
            "${args[@]}" \
            --out-dir "${ONLINE_WORKTREE}/data" \
            --branch-base-url "${BRANCH_BASE_URL}" \
            --manifest-fragment /tmp/fragments/usb-vid.json

      - name: Merge PlatformIO board dump (full + slim vendor view)
        id: merge-pio
        continue-on-error: true
        if: steps.dump-pio.outcome == 'success'
        run: |
          set -euo pipefail
          mkdir -p /tmp/fragments
          uv run --no-project --script \
            "${ONLINE_WORKTREE}/tools/merge_pio_boards.py" \
            --new /tmp/all_boards.json \
            --old "${ONLINE_WORKTREE}/data/pio-boards.json" \
            --out "${ONLINE_WORKTREE}/data/pio-boards.json" \
            --out-slim "${ONLINE_WORKTREE}/data/vendor_boards.json" \
            --manifest-fragment /tmp/fragments/pio-boards.json \
            --manifest-fragment-slim /tmp/fragments/vendor_boards.json

      # ────────────────────────────────────────────────────────────────────
      # Tier-4 USB-VID source: inlined supplement curated from
      # usb-ids.gowdy.us. The public text databases (Rust crate,
      # linux-usb.org, hwdata) don't carry newer VIDs like 0x303A Espressif
      # or 0x2E8A Raspberry Pi Foundation. The 253-entry overlay lives in
      # online-data-tools/vendor_names_inlined.py — committed to main so
      # the workflow is reproducible offline (no nightly live-scrape) and
      # auditable (each entry traces back to ids.txt -> ids4.json).
      # ────────────────────────────────────────────────────────────────────

      - name: Emit inlined vendor-name supplement (USB-VID tier-4)
        id: emit-inlined
        continue-on-error: true
        if: steps.merge-usb.outcome == 'success'
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/vendor_names_inlined.py" \
            --out /tmp/inlined-supplement.json

      - name: Overlay inlined supplement onto usb-vid.json
        id: overlay-inlined
        continue-on-error: true
        if: steps.emit-inlined.outcome == 'success'
        # vendor-override: the curated inlined names WIN over the upstream
        # text databases. Upstream products lists are preserved untouched —
        # only the vendor name field gets replaced for VIDs present in both.
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/overlay_usb_vid.py" \
            --upstream   "${ONLINE_WORKTREE}/data/usb-vid.json" \
            --supplement /tmp/inlined-supplement.json \
            --out        "${ONLINE_WORKTREE}/data/usb-vid.json" \
            --mode       vendor-override

      - name: Package usb-vendors.tar.zst (embeddable into fbuild)
        id: package-archive
        continue-on-error: true
        if: steps.overlay-inlined.outcome == 'success'
        # Compact {vid: vendor} dict in tar.zst form. fbuild include_bytes!()s
        # this at compile time so its USB-vendor lookup needs no runtime
        # network access and no `usb-ids` Rust crate dependency. PID-level
        # lookups live in the www-branch SQLite-over-HTTP DB.
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/build_vendor_archive.py" \
            --upstream "${ONLINE_WORKTREE}/data/usb-vid.json" \
            --out      "${ONLINE_WORKTREE}/data/usb-vendors.tar.zst"
          ls -la "${ONLINE_WORKTREE}/data/usb-vendors.tar.zst"

      - name: Package usb-vids.proto.zstd (runtime USB VID:PID overlay)
        id: package-usb-proto
        if: steps.merge-usb.outcome == 'success'
        # Full product-level runtime cache for fbuild CLI/device scans. This
        # is derived after source priority has already been resolved into
        # usb-vid.json; weak third-party rows only fill gaps left by
        # first-party/vendor/generic sources and never override their winners.
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/build_usb_vid_proto.py" \
            --upstream "${ONLINE_WORKTREE}/data/usb-vid.json" \
            --out      "${ONLINE_WORKTREE}/data/usb-vids.proto.zstd"
          ls -la "${ONLINE_WORKTREE}/data/usb-vids.proto.zstd"

      - name: Assemble manifest.json
        id: build-manifest
        # We rebuild the manifest whenever at least one dataset succeeded,
        # so generated_at moves even on a no-op data day (heartbeat).
        # Datasets that didn't merge this run get marked status=missing in
        # the manifest but keep their committed data file untouched.
        if: |
          steps.merge-usb.outcome == 'success' ||
          steps.merge-pio.outcome == 'success'
        run: |
          set -euo pipefail
          fragments=()
          if [ -f /tmp/fragments/usb-vid.json ]; then
            fragments+=(--fragment "usb-vid=/tmp/fragments/usb-vid.json")
          fi
          if [ -f /tmp/fragments/pio-boards.json ]; then
            fragments+=(--fragment "pio-boards=/tmp/fragments/pio-boards.json")
          fi
          if [ -f /tmp/fragments/vendor_boards.json ]; then
            fragments+=(--fragment "vendor_boards=/tmp/fragments/vendor_boards.json")
          fi
          uv run --no-project --script \
            "${ONLINE_WORKTREE}/tools/build_manifest.py" \
            --branch-base-url "${BRANCH_BASE_URL}" \
            --data-dir "${ONLINE_WORKTREE}/data" \
            --out "${ONLINE_WORKTREE}/manifest.json" \
            "${fragments[@]}"

      # ────────────────────────────────────────────────────────────────────
      # www branch: build today's SQLite, refresh static assets, download
      # sql.js, rotate old DBs, write www/manifest.json, annotate online
      # manifest with the link-out. All seven sub-steps run inside one
      # Python orchestrator (online-data-tools/update_www.py) and are
      # exercised end-to-end in test_orchestrators.py.
      # ────────────────────────────────────────────────────────────────────

      - name: Refresh www (sqlite + static site + manifests)
        id: build-sqlite
        # Only attempt if at least one upstream merger produced fresh JSON —
        # otherwise we'd be rebuilding yesterday's DB under a new filename,
        # which the rotation step would then evict tomorrow.
        if: steps.build-manifest.outcome == 'success'
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/update_www.py" \
            --workspace       "${{ github.workspace }}" \
            --online-worktree "${ONLINE_WORKTREE}" \
            --www-worktree    "${WWW_WORKTREE}" \
            --website-url     "${WEBSITE_URL}" \
            --sqljs-zip-url   "${SQLJS_BASE_URL}"

      # ────────────────────────────────────────────────────────────────────
      # Publish both branches via the same Python orchestrator. It handles
      # `git add` / commit-if-changed / 200-commit history prune /
      # first-push-falls-back-to-plain. End-to-end tested in
      # test_orchestrators.py against a bare local remote.
      # ────────────────────────────────────────────────────────────────────

      - name: Publish online-data branch
        id: commit
        if: steps.build-manifest.outcome == 'success'
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/publish_branch.py" \
            --worktree      "${ONLINE_WORKTREE}" \
            --branch        "${ONLINE_BRANCH}" \
            --message       "chore(online-data): nightly refresh" \
            --history-limit "${HISTORY_LIMIT}"

      - name: Publish www branch
        id: commit-www
        if: steps.build-sqlite.outcome == 'success'
        run: |
          uv run --no-project --script \
            "${{ github.workspace }}/online-data-tools/publish_branch.py" \
            --worktree      "${WWW_WORKTREE}" \
            --branch        "${WWW_BRANCH}" \
            --message       "chore(www): nightly refresh" \
            --body          "sqlite + static site rebuild from latest online-data" \
            --history-limit "${HISTORY_LIMIT}"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Update online-data"
            echo ""
            echo "| source / step | outcome |"
            echo "|---|---|"
            echo "| usb-ids-rs (dump example)  | ${{ steps.run-dump.outcome }} |"
            echo "| linux-usb.org              | ${{ steps.fetch-linux-usb.outcome }} |"
            echo "| usbids/usbids github       | ${{ steps.fetch-github.outcome }} |"
            echo "| espressif usb-pids         | ${{ steps.fetch-espressif-pids.outcome }} |"
            echo "| raspberrypi usb-pid        | ${{ steps.fetch-raspberrypi-pids.outcome }} |"
            echo "| nordic usb-pids            | ${{ steps.fetch-nordic-pids.outcome }} |"
            echo "| microchip first-party pids | ${{ steps.fetch-microchip-first-party-pids.outcome }} |"
            echo "| arduino usb-pids           | ${{ steps.fetch-arduino-pids.outcome }} |"
            echo "| adafruit usb-pids          | ${{ steps.fetch-adafruit-pids.outcome }} |"
            echo "| sparkfun first-party pids  | ${{ steps.fetch-sparkfun-first-party-pids.outcome }} |"
            echo "| seeed first-party pids     | ${{ steps.fetch-seeed-first-party-pids.outcome }} |"
            echo "| ftdi usb-pids              | ${{ steps.fetch-ftdi-pids.outcome }} |"
            echo "| wch usb-pids               | ${{ steps.fetch-wch-pids.outcome }} |"
            echo "| teensy usb-pids            | ${{ steps.fetch-teensy-pids.outcome }} |"
            echo "| stm usb-pids               | ${{ steps.fetch-stm-pids.outcome }} |"
            echo "| nxp usb-pids               | ${{ steps.fetch-nxp-pids.outcome }} |"
            echo "| silabs usb-pids            | ${{ steps.fetch-silabs-pids.outcome }} |"
            echo "| renesas weak pids          | ${{ steps.fetch-renesas-pids.outcome }} |"
            echo "| microchip weak pids        | ${{ steps.fetch-microchip-supplemental-pids.outcome }} |"
            echo "| sparkfun weak pids         | ${{ steps.fetch-sparkfun-supplemental-pids.outcome }} |"
            echo "| seeed weak pids            | ${{ steps.fetch-seeed-supplemental-pids.outcome }} |"
            echo "| pio boards (platformio)    | ${{ steps.dump-pio.outcome }} |"
            echo "| merge usb-vid              | ${{ steps.merge-usb.outcome }} |"
            echo "| emit inlined supplement    | ${{ steps.emit-inlined.outcome }} |"
            echo "| overlay inlined supplement | ${{ steps.overlay-inlined.outcome }} |"
            echo "| package vendor archive     | ${{ steps.package-archive.outcome }} |"
            echo "| merge pio-boards           | ${{ steps.merge-pio.outcome }} |"
            echo "| build manifest             | ${{ steps.build-manifest.outcome }} |"
            echo "| build sqlite (www)         | ${{ steps.build-sqlite.outcome }} |"
            echo "| committed (online-data)    | ${{ steps.commit.outputs.changed || 'n/a' }} |"
            echo "| committed (www)            | ${{ steps.commit-www.outputs.changed || 'n/a' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
